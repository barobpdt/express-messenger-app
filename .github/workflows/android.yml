name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Node 24 testing
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: echo "Testing with Node 24 environment"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
