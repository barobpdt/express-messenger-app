	@view=page('icons_search_view')
	@itemSearchCanvas=view.@canvas
	view.parentWidget(this)
}>

</page>

<page id="icons_search_view" module="icons_search_view"></page>

	p=page('CanvasTest:main')
	p.size(800,600)
	p.open()
	c=p.@canvas
	print("CanvasTest eval>>", c)
	
</script>

<script module="canvas_icons_search">
	init() {
		this.@iconSearchCanvas=null
		this.@useTimer=true
	}
	updateCanvas() {
		vbox(this.@rectCanvas, '30,*,40').inject(rcTop, rcBody, rcBottom)
		not(this.@form) {
			this.@form = initForm(conf('form.test_icons_search'))
		}
		view=page().@view
		view.move(rcBody.incr(2))
		not(view.is('visible')) {
			view.show()
		}
		not(this.@iconSearchCanvas) {
			this.@iconSearchCanvas=view.@canvas
			combo=findField(this.@form,'code','iconTypes').@widget
			this.@iconSearchCanvas.setMainCanvas(this)			
			this.@iconSearchCanvas.setIconTypes(combo)			
		}
		this.@rcTop=rcTop
		this.@rcBottom=rcBottom
		this.updateForm(this.@form, rcBottom)
		this.update()
	}
	timerCallback() {
		cur=this.@currentChangeItem
		if( cur ) {
			if( cur.code=='searchText') {
				filter=cur.@widget.value()
				this.@iconSearchCanvas.setFilter(filter, true)
			}
			this.@currentChangeItem=null
		}
	}
	changeValueCallback(cur) {
		this.@currentChangeItem=cur
	}
	clickBtn(cur) {
		switch(cur.code) {
		case search:
		case deleteIcon:
		default:
		}
	}
	drawBackground(dc) {
		bgColor=this.@baseColor.lightColor(100)
		title='아이콘 조회 테스트'
		textColor=this.@baseColor.darkColor(100)
		dc.save().font("size:12, color:${bgColor.lightColor(180)}, weight:bold")
		dc.fill(this.@rcTop, bgColor)
		dc.text(this.@rcTop.incrX(10).move(1,1), title) dc.font("color:$textColor")
		dc.text(this.@rcTop.incrX(10), title)
		fillGradient(dc, this.@rcBottom, bgColor, bgColor.lightColor(120))
		dc.restore()
	}
</script>
<script module="icons_search_view">
	init() {
		@canvas=createWidget('canvas','icons_search_canvas', null, 'icons_search_canvas')
		scroll=canvas.setScroll()
		scroll.widgetResizable(false)
		scroll.scrollPolicy('vscroll','on')
		scroll.scrollPolicy('hscroll','off')
		scroll.position('move',0)
		canvas.touchScroll()
		this.child(0).addChild(scroll, canvas)
	}
	onResize() {
		this.size().inject(w,h)
		canvas.updateSize(w-28, h)
	}
</script>

<script module="icons_search_canvas">
	init() {
		@db=Baro.db('icons')
		this.addNode('@dataIcons')
		this.addArray('@dataFilter')
		this.addArray('@selectItems')
		this.@itemSize=pt(50,80)
		this.@itemGap=5
		this.@itemMargin=4
		this.@maxItemCount=0
		this.setData()
		this.timer(500)
	}
	setData(type) {
		if(type) type=" and type='$type'"
		data=this.@dataIcons.removeAll(true)
		db.fetchAll("select type, id, prop, data from icons where 1=1 $type", data)
		this.setFilter('',true)
	}
	setFilter(filterText, checkUpdate) {
		a=this.@dataFilter.reuse()
		while(cur, this.@dataIcons ) {
			if(filterText) {
				cur.inject(type, id)
				ok=type.find(filterText,2) || id.find(filterText,2)
				if(ok) a.add(cur)
			} else {
				a.add(cur)
			}
		}
		if(checkUpdate) {
			this.updateSize()
		}
		return a;
	}
	onTimer() {
		if( this.@topDrawTick) {
			dist=System.tick()-this.@topDrawTick
			if(dist>1000) {
				this.@topDrawTick=0
				this.update()
			}
			return;
		}
	}
	drawItem(dc, item) {
		item.inject(rect, type, id)
		bgColor=color('#aaa')
		if( item==this.@mouseDownItem) {
			fillGradient(dc, rect, bgColor.lightColor(100), bgColor)
		} else if( this.@selectItems.find(item) ) {
			dc.fill(rect, '#eaa')
		}
		dc.rectLine(rect,0,bgColor)
		vbox(rect,'6,2,2').inject(rcIcon, rcText1, rcText2)
		dc.image(rcIcon.center(30,30), "${type}:${id}")
		dc.text(rcText1,type,'center') 
		dc.text(rcText2,id,'center')
	}
	updateSize(viewWidth, viewHeight) {
		checkVar('viewWidth')
		checkVar('viewHeight')
		this.@itemSize.inject(iw,ih)
		data=this.@dataFilter
		size=data.size()
		gap=this.@itemGap
		margin=this.@itemMargin
		cw=$[viewWidth-margin*2]		
		columnCount=$[cw/(iw+gap)]
		columnCount=columnCount.toInt()
		x=margin, y=margin
		idx=0, last=size-1
		while(cur, data, n) {
			cur.rect=rc(x,y,iw,ih)
			x+=iw+gap
			idx++
			if( n==last ) break;
			if( idx==columnCount ) {
				idx=0
				x=margin
				y+=ih+gap
			}
		}
		y+=ih+gap
		this.@maxItemCount=0
		this.@columnCount=columnCount
		this.size(viewWidth,y)
		this.update()
	}
	onDraw(dc, rc) {
		size=this.@dataFilter.size()
		rc.inject(x,y,w,h)
		rcDraw=rc(x,y,w,h+100)
		startIndex=0, endIndex=0, bstart=false
		for(n=0,size) {			
			rect=this.@dataFilter.$n.rect
			a=rect.lt(),b=rect.lb()
			if(bstart) {
				if(rcDraw.contains(b)) {
					endIndex=n
				} else if(rcDraw.contains(a)) {
					endIndex=n+this.@columnCount
					break;
				} else {
					break;
				}
			} else {
				if(rcDraw.contains(a) || rcDraw.contains(b)) {
					startIndex=n
					bstart=true
				}
			}
			n+=this.@columnCount
		}
		if(startIndex==0 ) {
			dist=System.tick()-this.@lastDrawTick
			if(dist<1000) {
				this.@topDrawTick=System.tick()
				c=color('#faa')
				rcTop=rc(0,0,this.@viewWidth,3)
				fillGradient(dc,rcTop, c, d.lightColor(100))
			}
		}		
		for(n=startIndex, endIndex) {
			this.drawItem(dc, this.@dataFilter.get(n))
		}
		dist=endIndex-startIndex
		if(this.@maxItemCount < dist) {
			this.@maxItemCount=dist
		}
		this.@endIndex=endIndex
		this.@lastDrawTick=System.tick()		
	}
	onMouseDown(p,a) {		
		startIndex=this.@endIndex - this.@maxItemCount
		if(startIndex<0) return;
		for(n=startIndex, this.@endIndex) {
			cur=this.@dataFilter.$n
			if(cur.rect.contains(p)) {				
				this.@mouseDownItem=cur
				this.update()
				break;
			}
		}
	}
	onMouseUp(p,a) {
		not( this.@mouseDownItem) return;
		item=this.@mouseDownItem
		rect=item.rect
		if(rect.contains(p)) {			
			if(a&KEY.shift) {
				prev=this.@selectItems.get(-1)
				not(a&KEY.ctrl) this.@selectItems.reuse()
				if(prev) {
					a=this.@dataFilter.find(prev)
					b=this.@dataFilter.find(item)
					if(a<b) {
						sp=a, ep=b
					} else {
						sp=b, ep=a
					}
					ep+=1
					for(n=sp,ep) this.@selectItems.add(this.@dataFilter.get(n))
				} else {
					this.@selectItems.add(item)
				}
			} else {
				not(a&KEY.ctrl) this.@selectItems.reuse()
				this.@selectItems.add(item)
			}
		}
		this.@mouseDownItem=null
		this.update()
	}
	setMainCanvas(main) {
		this.@mainCanvas=main
	}
	setIconTypes(combo) {		
		not(combo) return print("@@ setIconTypes combo 객체 미정의")
		if(combo.@data) return;
		data=combo.addNode('@data')
		db.fetchAll("select type, count(1) type_cnt from icons group by type", data)
		combo.check('editable', false)
		combo.popupSize('expanding',200)
		combo.addItem(data,'type','=선택=')
		combo.delegate(true, 30)
		event(combo,'onChange', this.changeIconTypes, this, true)
		event(combo,'onDraw', this.drawIconTypes, this, true)
	}
	changeIconTypes() {
		combo=Cf.funcNode().get('@sender')
		print("combo change combo==$combo")
		form=this.@mainCanvas.@form
		input=findField(form, 'code', 'searchText').@widget
		if(input) input.value('')
		cur=combo.current()
		type=when(cur, cur.type)
		this.setData(type)
	}
	drawIconTypes(dc, index, state) {
		combo=Cf.funcNode().get('@sender')
		if( state.eq(1) ) return;
		rc=dc.rect()
		cur=drawCombo(dc, index, state, combo.@data)
		not(cur) return;
		cur.inject(type, type_cnt)
		dc.font(10).text(rc.incrX(6), type)
		dc.font(8).text(rc.rightCenter(80,0,-6), "($type_cnt) 건", 'right')
	}

</script>
