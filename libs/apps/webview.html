<page id="main" margin="0" module="webview_page">
	<canvas id="webview" module="webview_canvas" >
</page>

<script module="webview_page">
	init() {	
		this.@canvas = widget('webview')
		this.@canvas.initWebview('messenger')
		this.addArray('@subPageList')
		if(conf('webview.useTray')) {
			tray = this.tray()
			tray.icon('vicon:application_add')
			menus=_node('menus')
			menus.addNode().with(id:'aaa',text:'aaa',icon:'vicon:arrow_branch')
			menus.addNode().with(id:'bbb',text:'bbb',icon:'vicon:arrow_divide')
			tray.contextMenu(nodeChildArray(menus))
			tray.show()
		}
	}
	onClose() {
		if(conf('webview.useTray')) {
			this.hide()
			return 'ignore';
		} else {
			this.closePage()
		}
	}
	onActivationChange() {
		not(this.is('active')) {
			this.@activeChangeTick=System.tick()
		}
	}
	closePage() {
		this.@canvas.closeWebview()
		System.sleep(100)
		Baro.worker('webviewCommand').close()
		Baro.process('pythonWebview').close()
		this.close()
	}
	openPage() {
		rcPage=System.info('screenRect',0).rightBottom(800,600,0,-60)
		this.open()
		this.move(rcPage)
		this.@canvas.webviewStart()
	}
	webviewActive() {
		/*
		logAppend("pythonWebview-out").append("@#> bridge:pageActive")
		*/
		this.@canvas.webviewActive()
	}
	onAction(action) {
	
	}
	getSubPage(name, rc, url) {	
		page=createWidget('page', name)
		not(this.@subPageList.find(page)) this.@subPageList.add(page)
		not(page.@canvas) {
			canvas=createWidget('canvas','subpageCanvas',page,'webview_canvas')
			canvas.initWebview(name)
			vbox=page.child(0)
			vbox.margin(0)
			vbox.addChild(canvas)			
			page.@canvas=canvas
		}
		if(typeof(rc,'rect')) {
			page.move(rc)
			page.open()
		} 
		startCheck=pp.@canvas.@status.eq('start') && pp.@canvas.@cmd.@jobStatus.ne('finish')
		if( startCheck ) {
			if(url) page.@canvas.@penddingList.add("@#>url:$url")
		} else {		
			page.@canvas.webviewStart(url)
		}
		return page
	}
</script>

<script module="webview_canvas">
	initWebview(name) {
		this.@webviewName=name
		this.@cmd=Baro.process(name)
		this.@worker=Baro.worker(name)
		this.@status='first'
		this.@checkStart=false
		this.@startWebviewTick=0
		this.@finishCnt=0 
		this.@dcCanvas = object("dc.$name")
		this.addArray('@penddingList')
		this.timer(250)
	}
	closeWebview() {
		this.killTimer()
		this.webviewExec('quit: webview close')
	}
	onDraw(dc, rc) {
		if( rc.eq(this.rect()) ) {
			not( rc.eq(this.@rectCanvas) ) {
				this.@rectCanvas=rc
				this.updateCanvas(rc)
			}
			this.drawBackground(dc, rc)
		} else {
			this.drawFrame(dc, rc)
		}
	}	
	updateCanvas(rc) {
		this.@webviewResizeTick=System.tick()
	}
	drawBackground(dc, rc) {		
		dc.fill('#aaa')
	}
	drawFrame(dc,rc) {
		timeline=this.timeline()
		not(isValid(timeline)) return;
		while(pair, timeline) {
			pair.inject(code, tm) not(tm.state()) continue;
			fc=call("drawFrame_$code")
			if(fc) {
				call(fc,this,dc,rc,tm.frame(), tm)
			}
		}
	}
	showAnimation(code, frame, duration, updateRect, loopCount) {
		tm=this.timeline(code, frame, duration)
		if(loopCount) tm.loopCount(loopCount)
		if(updateRect) tm.config().set('@updateRect', updateRect)
	}
	stopAnimation(code) {
		if(code) {
			tm=this.timeline().findPair(code)
			if(tm) {
				tm.stop()
			}
		} else {
			while(pair, this.timeline()) {
				pair.inject(code, tm)
				tm.stop()
			}
		}
		this.update()
	}
	webviewActive() {
		page=page('main')
		if( page.@activeChangeTick) {
			dist=System.tick() - page.@activeChangeTick
			if(dist<500) {
				print(">> webviewActive SKIP dist == $dist")
				return;
			}
		}
		page.flags('active')
		page.active()
		this.webviewExec('pageActive:bridge')
	}
	webviewResize() {
		this.@webviewResizeTick=0
		rect=toRect(this.geo())
		rect.inject(x,y,w,h)
		ww=w*0.8, hh=h*0.8
		this.webviewExec("geo:$x,$y,$ww,$hh,0")
		Baro.drawObject(this.@dcCanvas, this)
	}
	
	setWebviewResult(s) {
		/*내가 파이션에 요청한 결과처리*/
	}
	onTimer() {
		if( this.@finishTick ) {
			print(">> finish check ", this.@finishCnt )
			if(this.@finishCnt>10) return;
			if( checkTick(this.@finishTick, 500)) {
				this.@finishCnt++
				this.@finishTick=0
				this.webviewStart()
			}
			return;
		}
		this.inject(@cmd, @status)
		if( status.eq('first','close')) return;
		if( status.eq('init')) {
			result = cmd.@logTail.timeout() not(result) return;
			if(result.find('start:webview') ) {
				this.@status='start'
				this.@startWebviewTick=System.tick()
				this.updateCanvas()
			}
			print("init log result==$result")
			return;
		}
		if(cmd.@jobStatus.eq('finish')) {
			this.@finishTick = System.tick()
			return;			
		}
		if(cmd.@execStartTick) {
			return;
		}
		not(status.eq('start')) {
			return print(">> status error [$status]")
		}
		if(isValid(this.@penddingList) ) {
			execSource=this.@penddingList.pop()
			print("@@ pendding execSource:$execSource")
			this.webviewExec(execSource, true)
			return;
		}
		if(checkTick(this.@webviewResizeTick) ) {
			return this.webviewResize();
		} 
		if(checkTick(this.@startWebviewTick)) {
			not(this.@checkStart) {
				this.@checkStart = true
				this.webviewExec("setParent:${this.winId()}")
				this.@webviewResizeTick=System.tick()
			}
		}			
		
		result=cmd.@logTail.timeout() 
		not(result) {
			return;
		}
		print(">> webview log result:$result")
		if( result.find('bridge:') ) {			
			this.bridgeCall(result)
		}
	}
	runScript(s) {
		this.webviewExec("@#>runScript:$s")
	}
	bridgeCall(&s) {
		page=page('main')
		s.findPos('@#> bridge:')
		while(s.valid()) {
			left=s.findPos('@#>') not(left.ch()) continue;
			type=left.move()
			switch(type) {
			case pageActive:			
				this.webviewActive();
			case fullscreen:
				this.webviewExec('zoom:1.5')
				page.pageState('fullscreen')
			case maximized:
				this.webviewExec('zoom:1.0')
				page.pageState('maximized')			
			default:
				if(type.eq('py')) type='python'
				else if(type.eq('cb')) type='clipboard'
				not(left.ch('/')) return print("$type 시작 오류");
				index=left.incr().move() not(left.ch('/')) break;
				fc=call("user.bridge_$type")
				if(fc) {
					call(fc,cmd,this,index,param)
				} else {
					print("user.bridge_$type 함수 미정의")
				}
			}
			not(s.ch()) break;
			not(s.start('bridge:',true)) break;
		}  
	}
	webviewStart(url) {
		this.@status='init'
		this.@checkStart=false
		this.@startWebviewTick=0
		this.@penddingList.reuse()
		cmd=this.@cmd 
		name=this.@webviewName
		not(checkTag(cmd,'process')) {
			return print("@@webviewStart 오류 ($name webview command 객체 미정의)");
		}
		if( cmd.@jobStatus=='run' ) {
			print("webview 프로세스가 이미 실행중입니다")
			return;
		}
		py=pathJoin(conf('python.path'), 'python.exe')
		// sourcePath=pathJoin(conf('python.RUN_PATH'), 'webCommand.py')
		sourcePath=pathJoin(conf('python.RUN_PATH'), 'webview6.py')
		not(isFile(sourcePath)) {
			log("error::@python.getCommand 소스파일 경로가 없습니다 (경로:$sourcePath)")
		}
		logObj = logAppend("$name-log")
		outObj = logTail("$name-out")		
		not( cmd.@jobMode ) {
			// job
			cmd.@jobMode='Webview'		
			cmd.@jobStatus='start'
			cmd.@logAppend=logObj
			cmd.@logTail=outObj
			cmd.@canvas=this
			cmd.addArray('@cmdJobList')
			cmd.addArray('@webviewCommandList')
			addCmdJob(cmd)
		}
		cmd.@webviewCommandList.reuse()
		logFileName=logObj.get('logFileName')
		outFileName=outObj.get('logFileName')
		line=f["$py" "$sourcePath" --command="$logFileName" --out="$outFileName"]
		if(url) {
			line.add(" --url=$url")
		}
		addCmdJob(cmd, line)
	}
	webviewExec(execSource, skipPendding) {
		cmd=this.@cmd
		if( cmd.@jobStatus!='run' ) {
			print("@@ webviewExec 오류 웹뷰 실행중이 아닙니다")
			this.@penddingList.add(execSource)
			return;
		}
		if(checkTick(this.@startWebviewTick)) {
			cmd.@webviewCommandList.add(execSource)
			addUserWorker(this.@worker, cmd, @webview.callbackWorker )
		}  else {
			this.@penddingList.add(execSource)
			print(">> webview.exec : ${this.@penddingList}")
		}		
	}
	webviewStop() {
		this.webviewExec('quit:')
	}
</script>

<script>
	@webview.callbackWorker() {
		cmd=this
		if( cmd.@jobStatus!='run' ) {
			while(n=0,30) {
				System.sleep(100)
				// print(">>@keyboad.execSource workerStatus => $n", cmd.@jobStatus);
				if( cmd.@jobStatus=='run' ) {									
					if( cmd.@canvas.@checkStart ) {
						break;
					}
				}
			}
			if( cmd.@jobStatus!='run' ) {
				return print("@@ python webview command 프로그램이 실행중이 아닙니다");
			}
		}
		source=cmd.@webviewCommandList.pop()
		not(source) return print(">> 웹뷰 worker 실행오류 webviewCommandList 내용이 없습니다");
		print(">> webview command start")
		cmd.@execStartTick = System.tick()
		cmd.@logTail.timeout()
		cmd.@logAppend.append("@#>${source}")
		result=''
		while(n=0,64) {
			System.sleep(25)
			result = cmd.@logTail.timeout()
			if(result) {
				// print(">>@webview callback result: $result ($n)")
				cmd.@canvas.setWebviewResult(result)
				break;
			}
		}
		dist=System.tick() - cmd.@execStartTick
		if( dist>1000 ) {
			print("실행시간 초과 $dist (ms) $source")
		}
		cmd.@execStartTick=0
		if( cmd.@webviewCommandList.size() ) {
			cmd.@worker.push(cmd)			
		}
	}
</script>
