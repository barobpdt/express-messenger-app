<script note="앱공통 유틸리티 함수">
initApp() {
	include('@apps#webview')
	System.watcherClipboard(@app.clipboard)
	page=page('webview:main')
	page.openPage()
}

@app.startMessageServer(port) {
	not(port) port=8094
	server=object('baro.server') addModule(server,'message_server')
	server.start(port)
	return server;
}

@app.startMessageClient(userId, host, port, callback) {
	not(userId) userId="guest_${System.tick()}"
	not(host) host='localhost'
	not(port) port=8094
	client=object("baro.client_$userId") addModule(client,'message_client',userId, callback)
	// client.@loginOkCallback=callback
	client.setConnectInfo(host, port)
	return client;
}

@app.clipboard(type, data, text) {
	if( this.@clipboardTick ) {
		dist = System.tick() - this.@clipboardTick
		if(dist<500) {
			return;
		}
	}
	this.@clipboardTick=System.tick()
	cmd=Baro.process('pythonWebview')
	not(cmd.cmp('@jobStatus','run')) {
		print("webview 실행중이 아닙니다")
		return;
	}
	useHtml = conf('clipboard.useHtml')
	useText = conf('clipboard.useText')
	if(type=='html') {
		val=''
		page=page('webview:main')
		if(useHtml) {
			val=Cf.jsValue(data)
		}
		if(useText && text) {
			val=Cf.jsValue(text)
		}
		if(val) {
			page.@canvas.webviewExec(#[runScript:addChatMessage(${val})])
		}
		return;
	}
	if(type=='text') {
		if(useText && text) {
			val=Cf.jsValue(text)
			page.@canvas.webviewExec(#[runScript:addChatMessage(${val})])
		}
		return;
	}
	if(type=='image') {
		useImage = conf('clipboard.useImage')
		if( useImage ) {			 
			Baro.file().mkdir('c:/temp/clipboard-images', true)
			tm=System.localtime()
			filename="c:/temp/clipboard-images/copy-${tm}.png"
			fileWrite(filename, data)
			logFile=logAppend("pythonWebview-log").member(logFileName)
			cmd=Baro.process('nodejs')
			not(cmd.@jobStatus) {
				path=conf('path.express')
				addCmdJob(cmd,"cd $path")
			} 
			@app.callNodeJs('img2base64.js', filename)
		}
		return;
	}
	// print("$type : data=$data", text)	
	if(type=='urls') {
		useFile = conf('clipboard.useFile')
		if( useFile) {			
			@app.parseClipboardUrls(data)
		}
	}	
}
@app.callNodeJs(nodeSource, fullpath) {
	logFile=logAppend("pythonWebview-log").member(logFileName)
	cmd=Baro.process('nodejs')
	not(cmd.@jobStatus) {
		path=conf('path.express')
		addCmdJob(cmd,"cd $path")
	} 
	addCmdJob(cmd, #[node scripts/${nodeSource} "${fullpath}" "${logFile}"])
}
@app.parseClipboardUrls(&s) {
	fo=Baro.file()
	root=object('clipboard.fileRoot').removeAll()
	node=object('clipboard.fileEntries').removeAll(true)
	node.type='clipboard'
	node.pathInfo = s
	entries=node.addArray('entries')	
	while(s.valid()) {
		line=s.findPos("\n") not(line.ch()) continue;
		if( line.start('file:///', true) ) {
			fullpath=line.trim()
			print("fullpath==$fullpath")
			cur=root.addNode()
			if(isFolder(fullpath)) {
				cur.isDirectory=true
				cur.size=0
				sp=root.childCount()
				@app.pathList(fullpath, root)
			} else {
				cur.isDirectory=false
				cur.size=fo.fileInfo(fullpath,'size')
			}
			cur.fullpath=fullpath
			cur.ext=fo.fileInfo(fullpath,'ext')
			cur.name=fo.fileInfo(fullpath,'name')
			cur.createDate=fo.fileInfo(fullpath,'createDt')
			cur.modifyDate=fo.fileInfo(fullpath,'modifyDt')			
		}
	}
	while(cur, root ) {
		entries.add(cur)
	}
	page=page('webview:main')
	if( root.childCount()==1 ) {
		cur=root.child(0)
		ext=cur.ext.lower()
		if(ext.eq('zip')) {
			return @app.callNodeJs('zipfile-list.js', cur.fullpath)
		}
		if(ext.eq('png','jpeg','jpg','bmp','gif')) {
			@app.callNodeJs()
			return @app.callNodeJs('img2base64.js', cur.fullpath)
		}
	}
	val=json(node)
	page.@canvas.webviewExec(#[runScript:setFileList(${val})])
}
@app.bridgeTypeCall(webview, type, &param) {
	switch(type) {
	case cmd:
		cmd=cmdObject()
		cmd.@target=webview
		webview.@cmdBridge=cmd
		command=param.trim()
		addCmdJob(cmd, command, function(s,&end) {
			if(end) {
				end.findPos("\n")
				val=Cf.jsValue(end)
				endCheck=true
			} else {
				val=Cf.jsValue(s)
				endCheck=false
			}
			if( val ) {
				this.@target.webviewExec("@#>runScript:setCmdResult($val,$endCheck)")
			}
		})
	case cmdWrite:
		cmd=webview.@cmdBridge
		if( cmd && cmd.@jobStatus.eq('run')) {
			cmd.write(value)
		} else {
			webview.webviewExec("@#>runScript:setErrorMessage('cmd가 실행중이 아닙니다')")
		}
	default:
	}
}
@app.folderTree(path, root, depth) {
	not(root) root = object('app.folderTree').removeAll();
	not(depth) depth=0
	if( depth>conf('app.maxFolderDepth')) return;
	fo=Baro.file()
	fo.var(sort,'name, case')
	fo.list(path, func(info) {
		while(info.next()) {
			info.inject(type,name, fullPath)
			if(type.eq('file')) continue;
			if(name.eq('Windows', 'Program Files','Program Files (x86)')) continue;
			cur=root.addNode().with(type,name,fullPath)
			@app.folderTree(fullPath, cur, depth+1)
		}
	})
	return root;
}
@app.pathList(path, root, depth) {
	not(root) root = object('app.folderTree').removeAll()
	not(depth) depth=0
	if(depth>conf('app.maxFolderDepth')) {
		return
	}
	fo=Baro.file()
	fo.var(sort,'type, name, case')
	fo.list(path, function(info) {
		while(info.next()) {
			info.inject(type, name, fullPath, modifyDt, createDt, size, ext)
			isFolder=type.eq('folder')
			if( isFolder ) {	
				if(name.eq('Windows', 'Program Files','Program Files (x86)')) continue;
			}
			cur=root.addNode()
			cur.name=name
			cur.isDirectory=when(type.eq('folder'), true,false)
			cur.createDate = System.date(createDt)
			cur.modifyDate = System.date(modifyDt)
			cur.size=size
			if(isFolder) {
				@app.pathList(fullPath, root, depth+1)
			}
		}
	})
	return root;
}
@app.runNodeJsCommand(type, command) {
	cmd=Baro.process('runNodeJsCommand')
	log=logAppend('logParse')
	line="@#>${type}:${command}"
	if(cmd.cmp('@jobStatus', 'run')) {
		log.append(line)
	} else {
		tailName=log.member(logFileName)
		logName=cmd.@logTail.member(logFileName)
		cmd.addArray('@nodeCommends').add(line)
		addCmdJob(cmd, "cd ${conf('path.express')}/scripts")
		addCmdJob(cmd, #[node log-parse.js "${tailName}" --log "${logName}"])
	}
}

@app.userPath(callback) {
	cmd=Baro.process('app')
	if(cmd.@jobStatus=='run') {
		if(callback) callback(cmd, "userPath 오류 사용자 cmd가 실행중입니다")
		return;
	}
	cmd.@callbackResult=callback
	addCmdJob(cmd, "echo %userprofile%", function(result,end) {
		not(end) return;
		result.findPos("\n")
		path=result.findPos("\n").trim()
		if(this.@callbackResult) {
			this.@callbackResult(path)
		} else if(path) {
			if(this.@command.start('echo')) {
				conf('path.user', path.replace('\','/'), true)
			}
		}
	})
}
@app.killProcess(name) {
	not(name) return print("삭제할 프로세스명이 없습니다")
	cmd=Baro.process('common')
	addCmdJob(cmd, "tasklist | findstr $name", function(s,end) {
		not(end) return;
		s.findPos("\n")
		root=object('app.tasklist').removeAll()
		while(s.valid()) {
			line=s.findPos("\n") not(s.ch()) break;
			splitBlank(line).inject(name,pid,type,no,size)
			root.addNode().with(name,pid,type,no,size)
		}
		while(cur, root) {
			this.@current= cur
			addCmdJob(this, "taskkill /PID ${cur.pid} /F")
		}
	})
}
addWorker(command, callbackWorker ) {
	worker=Baro.worker('common')
	targetNode=object('common.workerNode').addNode()
	targetNode.@command=command
	targetNode.@worker=worker
	if(typeof(callbackWorker,'func')) {
		targetNode.@callbackWorker=callbackWorker
	} else {
		targetNode.@callbackWorker=function() { print("##addWorker callback 함수 미정의 (노드:$this)") };
	}
	not(worker.@callback) {
		worker.start(function(target) { if(target) target.@callbackWorker(target) });
	}
	worker.push(targetNode)
	return targetNode;
}
splitBlank(&s) {
	arr=_arr()
	not(s.ch()) return a;
	while(s.valid()) {	
		val=s.findPos(" \t\n", 4)
		arr.add(val)
		not(s.ch()) break;
	}
	return arr;
}
</script>

<script note="파이션 유틸리티 함수">
	pythonCommandError(cmd, &err) {
		if(err.start('@#> execException:',true)) {
			msg=err.trim()
			print("@@ 파이션 명령줄 실행 오류 ", cmd.id, msg)
		}
	}
	pythonCommandStart(callback) {
		py=pathJoin(conf('python.path'), 'python.exe')
		sourcePath	= pathJoin(conf('python.RUN_PATH'), 'runCommand.py')
		not(isFile(sourcePath)) {
			log("error::@python.getCommand 소스파일 경로가 없습니다 (경로:$sourcePath)")
		}
		cmd=Baro.process('pythonCommand')
		logObj	= logAppend("pythonCommand-log")
		outObj	= logTail("pythonCommand-out")
		not( cmd.@jobMode ) {
			cmd.@jobMode='PythonCommand'		
			cmd.@workerStatus='stay'
			cmd.@logAppend = logObj
			cmd.@logTail = outObj
			cmd.addArray('@cmdJobList')
			cmd.addArray('@commandList')
		}		
		logFileName=logObj.get('logFileName')
		outFileName=outObj.get('logFileName')
		line=f["$py" "$sourcePath" --command="$logFileName" --out="$outFileName"]
		print("python command start : $line")
		addCmdJob(cmd, line, callback)
	}
	
	pythonCommand(command, callbackFinish, maxCount) {
		not(command) return print("@@pythonCommand 명령라인이 없습니다")
		print(">> parseCommand 시작:$command")
		cmd=Baro.process('pythonCommand')
		not(cmd.@commandInfo) {
			cmd.addNode('@commandInfo')
		}
		ca=~(cmd.@jobMode)
		cb=cmd.@jobStatus.eq('finish')
		if( ca || cb ) {
			cmd.@firstCall=true
			cmd.@jobStatus='ready'
			cmd.@commandInfo.with(command, callbackFinish)
			pythonCommandStart(function(result,endCheck) {
				if(endCheck) return;
				cmd=this
				cmd.@commandInfo.inject(command, callbackFinish)
				if(cmd.@firstCall && command ) {
					print(">> python command runCommand.py 실행결과: $result")
					pythonCommand(command, callbackFinish)
				}
			})
			return;
		}
		not(maxCount) {
			cmd.@maxWaitCount = maxCount
		}
		
		callback = function() {
			cmd=this
			result=""
			maxCount=cmd.@maxWaitCount
			not(maxCount) maxCount=16
			print("pythonCommand 현재명령 작업시작 >> ${getLine(cmd.@currentCommand)}")
			while(n=0,maxCount) {
				if(cmd.@jobStatus.eq('finish')) {
					print("@@ python command 실행이 종료되었거나 오류가 발생했습니다 status:${cmd.@jobStatus}")
					return;
				}
				if(cmd.@firstCall) {					
					System.sleep(500)
					result=cmd.@logTail.timeout()
					not(result) continue;					
					print("xxxxxxxxx first call xxxxxxxx", result, cmd.@commandInfo)
					cmd.@commandInfo.inject(command)
					cmd.@commandInfo.reuse()
					if( command ) {
						cmd.@logAppend.append("@#>$command")
						if(command.start('quit:')) return;
					} else {
						return print("@@pythonCommand 현재명령 command 내용이 없습니다", cmd)
					}
					cmd.@firstCall=false
					continue;
				}
				System.sleep(250)
				result=cmd.@logTail.timeout()
				if(result) {
					if(result.find('@#> execException:')) {
						pythonCommandError(cmd, result);
					}
					if(cmd.@callbackFinish) {
						cmd.@callbackFinish(result)
					} else {
						print(">>pythonCommand 실행결과:$result", n)
					}
					break;
				}
				mod=n%10
				if(mod==9) print(">> python command count:$n")
			}
			cmd.@currentCommand=''
			not(result) {
				if(cmd.@callbackFinish) {
					cmd.@callbackFinish(result)
				} else {
					print(">>pythonCommand 실행결과가 없습니다", n)
				}
			}
		};
		cmd.@callbackWorker = callback
		cmd.@callbackFinish = callbackFinish
		cmd.@currentCommand=command
		not(cmd.@firstCall) {
			cmd.@logTail.timeout()
			cmd.@logAppend.append("@#>$command")
		}
		// cmd.@commandList.add(command)
		// print("python command size:", cmd.@commandList.size())
		addUserWorker('pythonCommand', cmd )
	}
	pythonRun(command, callback) {
		py=pathJoin(conf('python.path'), 'python.exe')
		not(isFile(py)) {
			return print("파이션 설치 경로 미설정 (경로:$py)");
		}
		not(callback) callback=function(s) { print("python version:$s") }
		runCommand("$py $command", callback)
	}
	pythonVersion(callback) {
		py=pathJoin(conf('python.path'), 'python.exe')
		not(isFile(py)) {
			return print("파이션 설치 경로 미설정 (경로:$py)");
		}
		not(callback) callback=function(s) { print("python version:$s") }
		runCommand("$py --version", callback)
	}
	pythonInstallStart(moduleName, startCheck) {
		if(args().size()==0) {
			// 매개변수 없이 호출하면 등록된 모듈정보 실행 (예) pythonInstallStart()
			startCheck=true
		}
		cmd=Baro.process('moduleInstall')
		not(cmd.@cmdJobList) {
			addCmdJob(cmd)
			cmd.addArray('@installModuleList')
			cmd.logCallback=@python.installCallback
		}
		py=pathJoin(conf('python.path'), 'python.exe')
		not(isFile(py)) {
			return print("파이션 설치 경로 미설정 (경로:$py)");
		}
		
		if( moduleName ) {
			info = object('python.installInfo')
			cur=findField(info,'name',moduleName)
			if(cur) {
				print("$moduleName 파이션 모듈이 이미 설치되었습니다", cur)
				return;
			}
			if(cmd.@installModuleList.find(moduleName)) {
				print("파이션 설치 $moduleName 이미 추가되었습니다(경로:$py)")
				return;
			}
			cmd.@installModuleList.add(moduleName)
			print("파이션 설치 모듈정보 ", cmd.@installModuleList)
		}
		if( startCheck) {
			moduleName=cmd.@installModuleList.pop()
			not(moduleName) {
				return print("설치 모듈정보가 없습니다 (pythonInstallAdd 함수로 파이션 설치 모듈을 등록하세요)");
			}
			cmd.@currentModuleName = moduleName
			if(moduleName.eq('list')) {
				cmd.@cmdJobList.add("$py -m pip $moduleName")
			} else if(moduleName.eq('upgrade')) {
				cmd.@cmdJobList.add("$py -m pip install --upgrade pip")
			} else {
				cmd.@cmdJobList.add("$py -m pip install $moduleName")
			}
		}
		return cmd;
	}
	@python.installCallback(result, param) {
		cmd=this
		if(cmd.@currentModuleName=='list') {
			@python.setInstallList(result)
		} else {
			print('파이션 설치정보 : ', result);
			if(cmd.@installModuleList.size()) {
				pythonInstallStart()
			}
		}
	}
	@python.setInstallList(&s) {
		info = object('python.installInfo')
		not(s) return info;
		start=false
		while(s.valid()) {
			line=s.findPos("\n") not(line.ch()) break;
			if(start) {
				name=line.findPos(" \t\n",4)
				version=line.trim()
				info.addNode().with(name, version)
				continue;
			}
			if(line.start('----')) {
				start=true;
			}
		}
		return info;
	}
	@python.webviewCheck(callback) {
		info=object('python.installInfo')
		not(info.childCount()) {
			pythonInstallStart('list', true)
			addUserWorker('user', this, function() {
				info=object('python.installInfo')
				while(n=0,32) {
					System.sleep(500)
					if(info.childCount()) {
						break;
					}
				}
				not(info.childCount()) return this.alert('파이션 설치정보를 찾을수 없습니다');
				@python.webviewCheck()
			})
			return;
		}
		// pythonInstallStart('rembg Pillow', true)
		aa=findField(info,'name','PyQt5')
		ab=findField(info,'name','PyQtWebEngine')
		if(aa && ab ) {
			return callback();
		}
		pythonInstallStart('PyQt5')
		pythonInstallStart('PyQtWebEngine')
		pythonInstallStart('pywin32')
		this.@cmdInstall=pythonInstallStart()
		addUserWorker('user',this,function() {
			for(n=0,100 ) {
				System.sleep(500)
				cmd=this.@cmdInstall
				aa=notValid(cmd.@cmdJobList)
				ab=cmd.@jobStatus.eq('finish')
				if( aa && ab ) {
					return callback()
				}
			}
		})
	}
	closePort(port) {
		not(port) port=80
		runCommand("netstat -ano | findstr $port", function(s,endCheck) {
			not(endCheck) return;
			while(s.valid()) {		
					s.findPos('TCP')
					not(s.ch()) break;
					line = s.findPos("\n")			
					line.findPos(":$port")
					c=line.ch(0)
					print(">> line:$line [$c]")
					not(typeof(c,'num')) {
						line.findPos('LISTENING')
						pid=line.trim()
						if(pid) {
							if(typeof(callback,'func')) {
								callback(pid)
							} else if(callback) {
								runCommand("taskkill /PID $pid /F" )
							}
							return;
						}
					}
				}
		})
	}
</script>

<script note="FM API호출">
	@fm.artistApply(name, target) {
		not(name) return print("@@@fm.artistSearch 오류 가수명을 입력하세요")
		not(target) {
			target=object('web.req').addNode()
		}
		target.url="https://lrclib.net/api/search?q=${name}&search_fields=artist_name"
		target.type='apply'
		addApiJob('artist_name', target, @callback.songs)
	}
	@callback.songs(&result, target) {
		not(result.find('#@>finish:')) return;
		result.findPos('#@>finish:')
		result.findPos('result=')
		success=result.match()
		result.findPos('url=')
		url=result.match()
		fnm=target.downloadFilename
		print("API JOB finish >>", url, success, fnm, target.type)
		if(target.type=='save') {
			apiResult=fileRead(fnm)
			print("db save apiResult==$apiResult")
			return;
		}
		if(target.type=='songs') {
			target.apiResult=fileRead(fnm)
			return;
		}
		if(target.type=='apply') {
			data=fileRead(fnm)
			target.parseJson(data)
			while(cur, target) {
				sub=object('web.req').addNode()
				data=sub.addNode()
				data.artist=cur.artistName
				data.title=cur.name
				data.lyrics=escapeString(cur.plainLyrics)			
				sub.type='save'
				sub.header='Content-Type:application/json'
				sub.url='http://localhost:8081/api/songs/save'
				sub.method='POST'
				sub.data=json(data)
				addApiJob('artist_name',sub, @callback.songs)
			}
			if(typeof(target.widget,'widget')) {
				cnt=target.size()
				if(cnt) {
					target.widget.alert("원격DB에 ${cnt}건 노래가 저장되었습니다")
				} else {
					target.widget.alert("저장할 데이터가 없습니다")
				}
			}
			return;
		}
	}
</script>

<script>
	checkNodeInstall(callback) {
		cmd=Baro.process('common')
		cmd.callbackResult=callback
		addCmdJob(cmd, "node --version", function(result, endCheck) {
			not(endCheck) return;
			print("callback", callback)
			if(result.start('@#>')) {
				ok=false
			} else {
				ok=true
			}
			conf('check.node_install', ok, true)
			if(this.callbackResult) this.callbackResult(ok)
		})
	}
	nodeChildArray(node) {
		arr=_arr()
		not(typeof(node,'node')) return arr;
		while(cur, node) {
			arr.add(cur)
		}
		return arr;
	}
	downloadWebType(filename, type) {
		not(type) type='js'
		path=conf('path.express')
		str=fileRead("$path/public/$filename")
		arr=_arr()
		node=_node('downloads')
		node.removeAll(true)
		if(type=='js') {		
			ss=str.ref()
			while(ss.valid()) {
				ss.findPos('<script')
				ss.findPos('src=')
				arr.add(ss.match())
			}
			while(url,arr) {
				if(url.start('https')) {
					cur=node.addNode()
					cur.url=url
					name=right(url,'/')
					cur.downloadFilename="$p/public/js/$name"
					addWebDownloadJob('public', cur)
				}
			}
		} else if(type=='css') {		
			ss=str.ref()
			while(ss.valid()) {
				ss.findPos('<link')
				ss.findPos('href=')
				arr.add(ss.match())
			}
			while(url,arr) {
				if(url.start('https')) {
					cur=node.addNode()
					cur.url=url
					name=right(url,'/')
					cur.downloadFilename="$p/public/css/$name"
					addWebDownloadJob('public', cur)
				}
			}
		}
	}
</script>
