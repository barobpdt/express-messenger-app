<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📁 파일 공유</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 32px 16px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(90deg, #58a6ff, #bf91f4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .desc {
            text-align: center;
            color: #6e7681;
            font-size: .85rem;
            margin-bottom: 28px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* 카드 */
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: .92rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #58a6ff;
        }

        /* 드롭존 */
        .dropzone {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 30px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            position: relative;
            margin-bottom: 14px;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: #58a6ff;
            background: #161f2e;
        }

        .dropzone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .dz-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .dropzone p {
            font-size: .82rem;
            color: #6e7681;
        }

        #file-name {
            font-size: .8rem;
            color: #58a6ff;
            font-weight: 600;
            margin-top: 6px;
        }

        /* 진행바 */
        .prog-wrap {
            height: 6px;
            background: #21262d;
            border-radius: 99px;
            overflow: hidden;
            margin: 12px 0 4px;
        }

        .prog-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #58a6ff, #bf91f4);
            border-radius: 99px;
            transition: width .2s;
        }

        .prog-label {
            font-size: .72rem;
            color: #6e7681;
            text-align: right;
        }

        /* 버튼 */
        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity .2s;
            margin-top: 10px;
        }

        button:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            opacity: .85;
        }

        .btn-blue {
            background: linear-gradient(90deg, #1d6feb, #1a56a4);
            color: #fff;
        }

        .btn-green {
            background: linear-gradient(90deg, #166534, #22c55e);
            color: #fff;
        }

        .btn-red {
            background: #450a0a;
            color: #f87171;
            border: 1px solid #7f1d1d;
        }

        .btn-sm {
            width: auto;
            padding: 6px 14px;
            font-size: .8rem;
            margin-top: 0;
        }

        /* 링크 결과 */
        .link-box {
            display: none;
            background: #0d1117;
            border: 1px solid #238636;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 14px;
        }

        .link-box.show {
            display: block;
        }

        .link-box .lbl {
            font-size: .72rem;
            color: #6e7681;
            margin-bottom: 6px;
        }

        .link-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .link-input {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #58a6ff;
            padding: 8px 10px;
            font-size: .82rem;
            outline: none;
            font-family: monospace;
        }

        .ttl {
            font-size: .72rem;
            color: #f59e0b;
            margin-top: 8px;
        }

        /* 파일 목록 */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 10px 14px;
        }

        .fi-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .fi-info {
            flex: 1;
            min-width: 0;
        }

        .fi-name {
            font-size: .88rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fi-meta {
            font-size: .72rem;
            color: #6e7681;
            margin-top: 2px;
        }

        .fi-ttl {
            color: #f59e0b;
        }

        .fi-acts {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* 로그 */
        .log {
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: .74rem;
            margin-top: 14px;
        }

        .log-row {
            padding: 2px 0;
            border-bottom: 1px solid #21262d;
        }

        .log-row.ok b {
            color: #22c55e;
        }

        .log-row.err b {
            color: #f87171;
        }

        .log-row.info b {
            color: #58a6ff;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 99px;
        }

        .empty {
            text-align: center;
            color: #6e7681;
            font-size: .84rem;
            padding: 20px;
        }
    </style>
	<link rel="stylesheet" href="/css/pretendard.css">
</head>

<body>
    <h1>📁 파일 공유</h1>
    <p class="desc">파일을 서버에 업로드하고 다운로드 링크를 공유하세요 (1시간 후 자동 만료)</p>

    <div class="container">

        <!-- 업로드 카드 -->
        <div class="card">
            <div class="card-title">📤 파일 업로드</div>

            <div class="dropzone" id="dropzone">
                <input type="file" id="file-input" />
                <div class="dz-icon">📂</div>
                <p>클릭하거나 파일을 드래그하세요</p>
                <div id="file-name"></div>
            </div>

            <div class="prog-wrap">
                <div class="prog-bar" id="prog-bar"></div>
            </div>
            <div class="prog-label" id="prog-label"></div>

            <button class="btn-green" id="btn-upload" onclick="uploadFile()" disabled>📤 업로드</button>

            <!-- 업로드 완료 링크 -->
            <div class="link-box" id="link-box">
                <div class="lbl">✅ 업로드 완료 — 아래 링크를 공유하세요</div>
                <div class="link-row">
                    <input class="link-input" id="link-input" readonly />
                    <button class="btn-blue btn-sm" onclick="copyLink()">복사</button>
                    <a id="link-dl" target="_blank">
                        <button class="btn-sm"
                            style="background:#1c2128;color:#c9d1d9;border:1px solid #30363d;margin-top:0">열기</button>
                    </a>
                </div>
                <div class="ttl" id="ttl-text"></div>
            </div>
        </div>

        <!-- 공유 목록 카드 -->
        <div class="card">
            <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
                <span>📋 공유 중인 파일</span>
                <button class="btn-sm btn-blue" onclick="loadFiles()">🔄 새로고침</button>
            </div>
            <div id="file-list" class="file-list">
                <div class="empty">파일을 불러오는 중...</div>
            </div>
        </div>

        <!-- 이벤트 로그 -->
        <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <span style="font-size:.82rem;color:#6e7681">📋 로그</span>
                <button class="btn-sm" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d"
                    onclick="clearLog()">지우기</button>
            </div>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        const API = '';   // 같은 서버면 빈 문자열
        let selectedFile = null;

        // ── 유틸 ──────────────────────────────────────────────────────────────────
        function log(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = `log-row ${type}`;
            el.innerHTML = `<span style="color:#6e7681">${new Date().toLocaleTimeString()} </span><b>${msg}</b>`;
            document.getElementById('log').prepend(el);
        }
        function clearLog() { document.getElementById('log').innerHTML = ''; }

        function fmtSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function fmtTTL(sec) {
            if (sec <= 0) return '만료됨';
            const m = Math.floor(sec / 60), s = sec % 60;
            return m > 0 ? `${m}분 ${s}초 후 만료` : `${s}초 후 만료`;
        }

        function fileIcon(mime = '') {
            if (mime.startsWith('image/')) return '🖼️';
            if (mime.startsWith('video/')) return '🎬';
            if (mime.startsWith('audio/')) return '🎵';
            if (mime.includes('pdf')) return '📄';
            if (mime.includes('zip') || mime.includes('rar') || mime.includes('7z')) return '🗜️';
            return '📁';
        }

        // ── 파일 선택 ─────────────────────────────────────────────────────────────
        const dz = document.getElementById('dropzone');
        document.getElementById('file-input').addEventListener('change', e => setFile(e.target.files[0]));
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
        dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('dragover');
            setFile(e.dataTransfer.files[0]);
        });

        function setFile(file) {
            if (!file) return;
            selectedFile = file;
            document.getElementById('file-name').textContent = `${file.name}  (${fmtSize(file.size)})`;
            document.getElementById('btn-upload').disabled = false;
            document.getElementById('link-box').classList.remove('show');
            setProgress(0, '');
            log(`파일 선택: ${file.name}  (${fmtSize(file.size)})`);
        }

        function setProgress(pct, label) {
            document.getElementById('prog-bar').style.width = pct + '%';
            document.getElementById('prog-label').textContent = label;
        }

        // ── 업로드 ────────────────────────────────────────────────────────────────
        async function uploadFile() {
            if (!selectedFile) return;
            const btn = document.getElementById('btn-upload');
            btn.disabled = true;
            setProgress(5, '업로드 중...');
            log(`업로드 시작: ${selectedFile.name}`);

            const form = new FormData();
            form.append('file', selectedFile);

            try {
                // XMLHttpRequest로 진행률 표시
                const result = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.upload.onprogress = e => {
                        if (e.lengthComputable) {
                            const pct = (e.loaded / e.total * 100).toFixed(1);
                            setProgress(pct, `${fmtSize(e.loaded)} / ${fmtSize(e.total)}`);
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
                        else reject(new Error(`${xhr.status}: ${xhr.responseText}`));
                    };
                    xhr.onerror = () => reject(new Error('네트워크 오류'));
                    xhr.open('POST', `${API}/api/files`);
                    xhr.send(form);
                });

                setProgress(100, '업로드 완료!');
                log(`업로드 완료: ${result.name}  (ID: ${result.fileId})`, 'ok');

                // 링크 표시
                const dlUrl = `${location.origin}${API}/api/files/${result.fileId}`;
                document.getElementById('link-input').value = dlUrl;
                document.getElementById('link-dl').href = dlUrl;
                document.getElementById('ttl-text').textContent = `⏱ ${fmtTTL(result.expiresIn)}`;
                document.getElementById('link-box').classList.add('show');

                await loadFiles();
            } catch (e) {
                setProgress(0, '');
                log(`업로드 실패: ${e.message}`, 'err');
                btn.disabled = false;
            }
        }

        function copyLink() {
            const val = document.getElementById('link-input').value;
            navigator.clipboard.writeText(val).then(() => log('링크 복사됨 ✅', 'ok'));
        }

        // ── 파일 목록 ─────────────────────────────────────────────────────────────
        async function loadFiles() {
            try {
                const res = await fetch(`${API}/api/files`);
                const list = await res.json();
                const el = document.getElementById('file-list');

                if (!list.length) {
                    el.innerHTML = '<div class="empty">공유 중인 파일이 없습니다</div>';
                    return;
                }

                el.innerHTML = list.map(f => `
				<div class="file-row">
					<div class="fi-icon">${fileIcon()}</div>
					<div class="fi-info">
						<div class="fi-name" title="${f.name}">${f.name}</div>
						<div class="fi-meta">
							${fmtSize(f.size)}
							<span class="fi-ttl">  ⏱ ${fmtTTL(f.expiresIn)}</span>
						</div>
					</div>
					<div class="fi-acts">
						<button class="btn-blue btn-sm" onclick="copyFileLink('${f.fileId}')">링크 복사</button>
						<a href="${location.origin}${API}/api/files/${f.fileId}" download="${f.name}">
							<button class="btn-sm" style="background:#1c2128;color:#c9d1d9;border:1px solid #30363d;margin-top:0">다운로드</button>
						</a>
						<button class="btn-red btn-sm" onclick="deleteFile('${f.fileId}')">삭제</button>
					</div>
				</div>`).join('');
            } catch (e) {
                log('파일 목록 로드 실패: ' + e.message, 'err');
            }
        }

        function copyFileLink(fileId) {
            const url = `${location.origin}${API}/api/files/${fileId}`;
            navigator.clipboard.writeText(url).then(() => log('링크 복사됨 ✅', 'ok'));
        }

        async function deleteFile(fileId) {
            if (!confirm('파일을 삭제하시겠습니까?')) return;
            try {
                await fetch(`${API}/api/files/${fileId}`, { method: 'DELETE' });
                log('파일 삭제됨', 'ok');
                await loadFiles();
            } catch (e) {
                log('삭제 실패: ' + e.message, 'err');
            }
        }

        // 초기 로드 + 30초마다 TTL 갱신
        loadFiles();
        setInterval(loadFiles, 30000);
    </script>
</body>

</html>
