<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 바둑 대국 (KataNet)</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="/css/pretendard.css">
  <style>
    :root {
      --bg: #f4f4f9;
      --panel: #ffffff;
      --text: #333;
      --border: #e0e0e0;
      --board-bg: #dcbc7a;
      --board-line: #000000;
      --accent: #007bff;
      --accent-hover: #0056b3;
      --danger: #dc3545;
      --secondary: #6c757d;
      --overlay: rgba(0, 0, 0, 0.45);
    }

    [data-theme="dark"] {
      --bg: #121212;
      --panel: #1e1e1e;
      --text: #f0f0f0;
      --border: #333;
      --board-bg: #c09d59;
      --board-line: #1a1a1a;
      --overlay: rgba(0, 0, 0, 0.65);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--panel);
      border-radius: 16px;
      padding: 32px;
      width: min(480px, 95vw);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal h2 {
      margin: 0 0 24px;
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      opacity: .8;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-group label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      font-size: .95rem;
      font-weight: 500;
    }

    .radio-group input[type=radio] {
      display: none;
    }

    .radio-group input[type=radio]:checked+label {
      border-color: var(--accent);
      background: rgba(0, 123, 255, .08);
      color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .modal-actions .btn {
      flex: 1;
    }

    /* ── RESULT MODAL ── */
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .score-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 2px solid var(--border);
    }

    .score-card.winner {
      border-color: #ffd700;
      background: rgba(255, 215, 0, .1);
    }

    .score-card .stone {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin: 0 auto 8px;
    }

    .stone.black {
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border: 2px solid #333;
    }

    .stone.white {
      background: radial-gradient(circle at 35% 35%, #fff, #ddd);
      border: 2px solid #999;
    }

    .score-card .score-num {
      font-size: 2rem;
      font-weight: 800;
    }

    .score-card .score-detail {
      font-size: .8rem;
      opacity: .7;
      margin-top: 6px;
    }

    .winner-badge {
      font-size: .75rem;
      font-weight: 700;
      background: #ffd700;
      color: #333;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 8px;
    }

    /* ── AI THINKING (sidebar) ── */
    .ai-thinking-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(0, 123, 255, .07);
      border-radius: 8px;
      border: 1px solid rgba(0, 123, 255, .2);
    }

    .ai-thinking-wrap.active {
      display: flex;
    }

    .ai-thinking-label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Pulsing dots */
    .thinking-dots {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .thinking-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes dotPulse {

      0%,
      80%,
      100% {
        transform: scale(.6);
        opacity: .4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── HEADER ── */
    header {
      height: 60px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
      box-shadow: 0 2px 4px rgba(0, 0, 0, .05);
      z-index: 10;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #info-bar {
      font-size: .85rem;
      color: var(--secondary);
    }

    /* ── WORKSPACE ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: row;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px;
      flex-shrink: 0;
    }

    .status-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .turn-indicator {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .turn-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #555;
      flex-shrink: 0;
    }

    .turn-circle.black {
      background: radial-gradient(circle at 35% 35%, #555, #111);
    }

    .turn-circle.white {
      background: radial-gradient(circle at 35% 35%, #fff, #ddd);
    }

    .captured-area {
      display: flex;
      justify-content: space-around;
      font-size: .9rem;
      margin-top: 10px;
    }

    .captured-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .captured-count {
      font-size: 1.3rem;
      font-weight: 800;
    }

    /* Timer */
    .timer-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .timer-label {
      font-size: .8rem;
      opacity: .7;
      margin-bottom: 4px;
    }

    .timer-display {
      font-size: 2.2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      transition: color .3s;
    }

    .timer-display.urgent {
      color: #dc3545;
    }

    .timer-display.warning {
      color: #fd7e14;
    }

    /* AI info */
    .ai-info-box {
      background: linear-gradient(135deg, rgba(0, 123, 255, .1), rgba(0, 80, 200, .05));
      border: 1px solid rgba(0, 123, 255, .25);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: .85rem;
    }

    .ai-info-box .ai-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ai-score-bar {
      font-size: .9rem;
    }

    /* Buttons */
    .btn {
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 10px;
      font-family: inherit;
    }

    .btn:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.secondary {
      background: var(--secondary);
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.success {
      background: #28a745;
    }

    .btn.outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .btn.outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .icon-btn {
      padding: 8px 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text);
      font-size: 1.2rem;
      border-radius: 6px;
      transition: background .2s;
      display: flex;
      align-items: center;
    }

    .icon-btn:hover {
      background: var(--bg);
    }

    /* Board container */
    .board-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: var(--bg);
      overflow: auto;
      position: relative;
    }

    #goban canvas {
      background: var(--board-bg);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
      border-radius: 4px;
      cursor: crosshair;
      display: block;
    }

    /* Rules hint */
    .rules-hint {
      margin-top: auto;
      padding-top: 16px;
      font-size: .8rem;
      opacity: .6;
      border-top: 1px solid var(--border);
    }

    .rules-hint ul {
      padding-left: 18px;
      margin: 8px 0 0;
    }

    .rules-hint li {
      margin-bottom: 4px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .workspace {
        flex-direction: column-reverse;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-top: 1px solid var(--border);
        padding: 12px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
        align-items: flex-start;
      }

      .status-box,
      .timer-box,
      .ai-info-box {
        flex: 1 1 160px;
        margin-bottom: 0;
      }

      .btn {
        margin-bottom: 0;
      }

      .rules-hint {
        display: none;
      }
    }
  </style>

  <script src="/js/jquery.js"></script>

</head>

<body>

  <!-- ══════════════════════════════════════════════
     SETTINGS MODAL
════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2><i class='bx bx-cog'></i> 새 게임 설정</h2>
      <!--
    <div class="form-group">
      <label>게임 모드</label>
      <div class="radio-group">
        <input type="radio" name="mode" id="mode-go" value="go" checked onchange="updateSizeOptions('go')"><label for="mode-go">⚪ 바둑 (Go)</label>
        <input type="radio" name="mode" id="mode-omok" value="omok" onchange="updateSizeOptions('omok')"><label for="mode-omok">⚫ 오목 (Omok)</label>
      </div>
    </div>
	-->
      <div class="form-group">
        <label id="label-size">판 크기</label>
        <div class="radio-group" id="size-options">
          <input type="radio" name="sz" id="sz9" value="9"><label for="sz9">9×9</label>
          <input type="radio" name="sz" id="sz13" value="13"><label for="sz13">13×13</label>
          <input type="radio" name="sz" id="sz15" value="15"><label for="sz15" id="label-sz15"
            style="display:none;">15×15</label>
          <input type="radio" name="sz" id="sz19" value="19" checked><label for="sz19">19×19</label>
        </div>
      </div>

      <div class="form-group" id="handicap-group">
        <label for="setting-handicap">핸디캡 (흑 선치기 돌 수) <span id="handicap-val">0</span>수</label>
        <input type="range" id="setting-handicap" min="0" max="9" value="0"
          oninput="document.getElementById('handicap-val').textContent=this.value">
      </div>

      <div class="form-group">
        <label>AI 레벨</label>
        <div class="radio-group">
          <input type="radio" name="lv" id="lv-kyu" value="kyu" checked><label for="lv-kyu">🟢 급 (쉬움)</label>
          <input type="radio" name="lv" id="lv-dan" value="dan"><label for="lv-dan">🔴 단 (어려움)</label>
        </div>
      </div>

      <div class="form-group">
        <label for="setting-byoyomi">초읽기 제한 시간 (초, 0 = 무제한)</label>
        <input type="number" id="setting-byoyomi" value="30" min="0" max="300" step="10">
      </div>

      <div class="modal-actions">
        <button class="btn secondary" onclick="closeSettingsModal()">취소</button>
        <button class="btn" onclick="applySettingsAndStart()"><i class='bx bx-play'></i> 게임 시작</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
     SCORE RESULT MODAL
════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="score-modal">
    <div class="modal">
      <h2><i class='bx bx-award'></i> 계가 결과</h2>
      <div class="score-grid" id="score-grid"><!-- filled by JS --></div>
      <div id="score-msg" style="text-align:center;font-size:1.1rem;font-weight:700;margin-top:8px;"></div>
      <div class="modal-actions">
        <button class="btn outline" onclick="downloadSgf()"><i class='bx bx-download'></i> 기보 저장</button>
        <button class="btn"
          onclick="document.getElementById('score-modal').classList.remove('active');openSettingsModal(true)">
          <i class='bx bx-refresh'></i> 새 게임
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════ -->
  <header>
    <div class="header-title">
      <i class='bx bx-grid'></i> AI 바둑 대국
    </div>
    <div id="info-bar">게임을 시작하세요</div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleTheme()" title="테마 전환">
        <i class='bx bx-moon' id="theme-icon"></i>
      </button>
      <button class="btn outline" style="width:auto;margin:0;padding:8px 16px;" onclick="openSettingsModal(false)">
        <i class='bx bx-plus-circle'></i> 새 게임
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════
     WORKSPACE
════════════════════════════════════════════════ -->
  <div class="workspace">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- Turn & capture -->
      <div class="status-box">
        <div class="turn-indicator">
          <div class="turn-circle black" id="turn-circle"></div>
          <span id="turn-text">흑 차례</span>
        </div>
        <div class="captured-area">
          <div class="captured-item">
            <span>따낸 백돌 (흑)</span>
            <div class="captured-count" id="cap-white">0</div>
          </div>
          <div class="captured-item">
            <span>따낸 흑돌 (백)</span>
            <div class="captured-count" id="cap-black">0</div>
          </div>
        </div>
      </div>

      <!-- Timer -->
      <div class="timer-box" id="timer-box">
        <div class="timer-label">⏱ 초읽기 <span id="byoyomi-count"></span></div>
        <div class="timer-display" id="timer-display">--</div>
      </div>

      <!-- AI score info -->
      <div class="ai-info-box">
        <div class="ai-title"><i class='bx bx-brain'></i> KataNet AI</div>
        <div class="ai-score-bar" id="ai-score-bar">게임 시작 후 형세 표시</div>
        <!-- AI thinking animation -->
        <div class="ai-thinking-wrap" id="ai-thinking-wrap">
          <div class="thinking-dots">
            <span></span><span></span><span></span>
          </div>
          <span class="ai-thinking-label">AI 생각 중...</span>
        </div>
      </div>

      <!-- Controls -->
      <button class="btn secondary" id="btn-pass" onclick="playerPass()" disabled><i class='bx bx-skip-next'></i> 한 수 쉼
        (Pass)</button>
      <button class="btn outline" id="btn-undo" onclick="playerUndo()" disabled><i class='bx bx-undo'></i> 무르기
        (Undo)</button>
      <button class="btn success" id="btn-score" onclick="requestScore()" disabled><i class='bx bx-calculator'></i> 계가
        요청</button>
      <button class="btn outline" id="btn-sgf" onclick="downloadSgf()" disabled><i class='bx bx-download'></i> 기보 저장
        (.sgf)</button>
      <button class="btn danger" id="btn-resign" onclick="playerResign()" disabled><i class='bx bx-flag'></i>
        기권</button>

      <div class="rules-hint">
        <strong>규칙 안내</strong>
        <ul>
          <li>사용자 = ⚫ 흑, AI = ⚪ 백</li>
          <li>19×19: KataGo 신경망 AI</li>
          <li>9×9/13×13: 휴리스틱 AI</li>
          <li>2연속 패스 시 자동 계가</li>
          <li>중국식 집 계산 (코미 6.5)</li>
        </ul>
      </div>
    </div>

    <!-- BOARD -->
    <div class="board-container" id="board-container">
      <div id="goban"></div>
    </div>
  </div>

  <script src="/go/js/tensorflow.js"></script>
  <script src="/go/js/goban.js"></script>
  <script src="/js/go-ai.js"></script>

</body>

</html>
