<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Express Messenger Hub</title>
    <!-- Import Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0a0a0f;
            --color-bg-secondary: #13131a;
            --color-surface: rgba(255, 255, 255, 0.05);
            --color-primary-start: #667eea;
            --color-primary-end: #764ba2;
            --color-text-primary: #ffffff;
            --color-text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--color-primary-start);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        #setup-container {
            display: none;
            width: 100%;
            max-width: 400px;
            background: var(--color-surface);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--color-primary-start);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <div>연결 중입니다...</div>
    </div>

    <div id="setup-container">
        <h1>서버 연결 모드</h1>
        <p>앱을 서버에 연결합니다.<br>같은 와이파이나 네트워크 환경의<br>서버 주소를 입력하세요.</p>

        <div class="input-group">
            <label>웹 서버 URL</label>
            <input type="text" id="server-url" placeholder="예: http://192.168.0.x:8081" autocomplete="off"
                autocorrect="off">
        </div>

        <button onclick="connectServer()">연결하기</button>
        <div id="error-text" class="error-msg"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // URL 파라미터 확인 후 초기화 처리
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('reset') === '1') {
                localStorage.removeItem('hubServerUrl');
                // URL에서 파라미터 숨기기
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Capacitor 환경 검증을 위해 약간의 지연 처리
            setTimeout(() => {
                const isMobileApp = window.Capacitor && window.Capacitor.isNativePlatform();

                if (isMobileApp) {
                    const savedUrl = localStorage.getItem('hubServerUrl');

                    if (savedUrl) {
                        // 저장된 서버로 WebView 즉시 연결
                        window.location.href = savedUrl + '/main.html';
                    } else {
                        // 저장된 내용이 없으면 설정화면 표시
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('setup-container').style.display = 'block';
                    }
                } else {
                    // 모바일(Capacitor)이 아닌 일반 PC 웹 브라우저일 경우 메신저로 즉시 넘김
                    window.location.href = 'messenger.html';
                }
            }, 300);
        });

        function connectServer() {
            const urlInput = document.getElementById('server-url').value.trim();
            const errorText = document.getElementById('error-text');

            if (!urlInput) {
                errorText.innerText = "서버 주소를 입력해주세요.";
                return;
            }

            if (!urlInput.startsWith('http://') && !urlInput.startsWith('https://')) {
                errorText.innerText = "http:// 또는 https:// 로 시작하는 주소를 입력하세요.";
                return;
            }

            // 끝에 슬래시 제거
            const cleanUrl = urlInput.endsWith('/') ? urlInput.slice(0, -1) : urlInput;

            errorText.style.color = "#4ade80";
            errorText.innerText = "서버에 접속합니다...";

            localStorage.setItem('hubServerUrl', cleanUrl);

            setTimeout(() => {
                // 해당 시스템/디바이스의 웹뷰를 원격 URL로 리다이렉션
                window.location.href = cleanUrl + '/main.html';
            }, 500);
        }
    </script>
</body>

</html>
