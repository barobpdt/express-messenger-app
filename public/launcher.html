<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 찾는 중...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #30363d;
            border-bottom-color: #58a6ff;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #status {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        #log {
            font-size: 0.8rem;
            color: #6e7681;
            font-family: monospace;
            max-width: 80%;
            text-align: center;
            height: 20px;
        }

        .manual-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            display: none;
            /* Initially hidden */
            transition: background 0.2s;
        }

        .manual-btn:hover {
            background: #30363d;
        }
    </style>
</head>

<body>

    <span class="loader" id="spinner"></span>
    <div id="status">로컬 네트워크에서 서버를 찾는 중입니다...</div>
    <div id="log">IP 대역을 스캔하고 있습니다.</div>
    <a href="#" id="manual-btn" class="manual-btn" onclick="directConnect()">수동으로 IP 입력하기</a>

    <script>
        const PORT = 8081;          // 찾을 대상 서버의 포트
        const TIMEOUT_MS = 1500;    // 요청 대기 시간
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const spinnerEl = document.getElementById('spinner');
        const manualBtn = document.getElementById('manual-btn');

        let found = false;

        // 1. 자신의 로컬 IP 서브넷 대역 찾기 (WebRTC 트릭)
        function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel("");
                pc.createOffer().then(offer => pc.setLocalDescription(offer));

                pc.onicecandidate = (ice) => {
                    if (ice && ice.candidate && ice.candidate.candidate) {
                        const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate);
                        if (ipMatch) {
                            resolve(ipMatch[1]);
                            pc.onicecandidate = null; // 정리
                        }
                    }
                };

                // Fallback (WebRTC를 브라우저가 막았을 경우)
                setTimeout(() => resolve("192.168.0.x"), 1000); // 흔한 기본 대역 사용
            });
        }

        // 2. 해당 IP에 핑(fetch) 보내기 (병렬로 255개 날림)
        async function fetchServer(ip) {
            const url = `http://${ip}:${PORT}/api/health`;
            try {
                // AbortController로 짧은 시간 내에 응답 없으면 취소
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

                const res = await fetch(url, { signal: controller.signal, mode: 'no-cors' });
                clearTimeout(timeoutId);

                // no-cors이므로 제대로 된 내용은 못 읽지만, 응답이 돌아온다는 것 자체가 서버가 살아있다는 증거
                if (!found) {
                    found = true;
                    connectToServer(ip);
                }
            } catch (err) {
                // Timeouts or connection refused
            }
        }

        function connectToServer(ip) {
            statusEl.textContent = `서버를 찾았습니다! (${ip})`;
            statusEl.style.color = '#58a6ff';
            logEl.textContent = '메신저로 이동합니다...';
            spinnerEl.style.borderColor = '#58a6ff';
            spinnerEl.style.borderBottomColor = 'transparent';

            setTimeout(() => {
                window.location.href = `http://${ip}:${PORT}/messenger.html`;
            }, 800);
        }

        async function startScan() {
            logEl.textContent = 'WebRTC로 로컬 대역 확인 중...';
            const localIP = await getLocalIP();

            let baseIp = '';
            if (localIP !== "192.168.0.x") {
                const parts = localIP.split('.');
                parts.pop();
                baseIp = parts.join('.') + '.';
                logEl.textContent = `확인된 네트워크 대역: ${baseIp}x`;
            } else {
                baseIp = '192.168.0.'; // fallback
                logEl.textContent = `기본 대역 스캔: ${baseIp}x 및 192.168.1.x`;
            }

            // 스캔할 IP 목록 생성
            const ipsToScan = [];

            // 찾아낸 대역 1~254
            for (let i = 1; i < 255; i++) {
                ipsToScan.push(`${baseIp}${i}`);
            }

            // 추가적으로 자주 쓰이는 공유기 대역망도 함께 찔러봄 (만약에 대비)
            if (baseIp !== '192.168.0.' && baseIp !== '192.168.1.') {
                for (let i = 1; i < 255; i++) ipsToScan.push(`192.168.0.${i}`);
                for (let i = 1; i < 255; i++) ipsToScan.push(`192.168.1.${i}`);
            }

            // 로컬 호스트도 항상 찔러봄
            ipsToScan.push('127.0.0.1');

            logEl.textContent = `총 ${ipsToScan.length}개의 호스트를 검색합니다...`;

            // 모든 IP에 병렬 요청
            Promise.allSettled(ipsToScan.map(ip => fetchServer(ip))).then(() => {
                if (!found) {
                    statusEl.textContent = "❌ 서버를 찾지 못했습니다.";
                    statusEl.style.color = "#f87171";
                    spinnerEl.style.animation = "none";
                    spinnerEl.style.borderColor = "#450a0a";
                    logEl.textContent = "서버가 켜져 있는지 확인하거나 직접 IP를 입력하세요.";
                    manualBtn.style.display = 'inline-block';
                }
            });
        }

        function directConnect() {
            const ip = prompt("서버의 IP 주소를 입력하세요 (예: 192.168.0.15):");
            if (ip) {
                window.location.href = `http://${ip}:${PORT}/messenger.html`;
            }
        }

        // 약간의 딜레이 후 시작 (사용자가 로딩창을 인식할 수 있게)
        setTimeout(startScan, 500);

    </script>
</body>

</html>
