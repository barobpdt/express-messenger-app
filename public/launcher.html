<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Express Messenger Launcher</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: var(--border);
            cursor: not-allowed;
            color: #94a3b8;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        .error {
            color: var(--error);
        }

        .success {
            color: #22c55e;
        }

        .loading {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Express Messenger</h1>
        <p>PC 서버의 IP 주소를 입력하여 연결하세요.<br>(예: 192.168.0.10)</p>

        <div class="input-group">
            <label for="ipInput">서버 IP 주소 (혹은 도메인)</label>
            <input type="text" id="ipInput" placeholder="192.168.x.x" autocomplete="off" autocorrect="off"
                autocapitalize="off">
        </div>

        <button id="connectBtn" onclick="testAndConnect()">연결하기 (Connect)</button>
        <div id="status"></div>
    </div>

    <script>
        const ipInput = document.getElementById('ipInput');
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');

        // 이전에 저장된 IP가 있으면 불러오기
        const savedIp = localStorage.getItem('serverIp');
        if (savedIp) {
            ipInput.value = savedIp;
            // 자동 연결 시도
            testAndConnect(true);
        }

        async function testAndConnect(isAuto = false) {
            const ip = ipInput.value.trim();
            if (!ip) {
                statusDiv.className = 'error';
                statusDiv.innerText = 'IP 주소를 입력해주세요.';
                return;
            }

            // 'http://' 등 프로토콜이 없으면 붙여줌
            let originUrl = ip;
            if (!originUrl.startsWith('http')) {
                // localhost이거나 ip주소 패턴이면 http
                originUrl = 'http://' + originUrl;
            }
            // 포트번호가 없으면 8081 추가 (옵션이지만 보통 8081을 씀)
            if (!originUrl.match(/:\d+$/)) {
                const urlObj = new URL(originUrl.startsWith('http') ? originUrl : 'http://' + originUrl);
                if (!urlObj.port) originUrl += ':8081';
            }

            // 프로토콜 다시 씌움
            if (!originUrl.startsWith('http')) originUrl = 'http://' + originUrl;

            statusDiv.className = 'loading';
            statusDiv.innerText = isAuto ? '자동 연결 중...' : '서버 연결 확인 중...';
            connectBtn.disabled = true;
            connectBtn.innerText = 'Connecting...';

            try {
                // /api/health 엔드포인트나 메인 화면(index) 요청으로 살아있는지 확인
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000); // 3초 타임아웃

                const response = await fetch(originUrl + '/api/health', {
                    method: 'GET',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    statusDiv.className = 'success';
                    statusDiv.innerText = '연결 성공! 이동합니다...';

                    // 서버 IP를 저장
                    localStorage.setItem('serverIp', ipInput.value.trim());
                    localStorage.setItem('backendOrigin', originUrl);

                    // 앱 내 파일인 messenger.html로 이동 (내부에서 localStorage 읽음)
                    setTimeout(() => {
                        window.location.href = 'messenger.html';
                    }, 500);
                } else {
                    throw new Error('Server returned ' + response.status);
                }
            } catch (err) {
                console.error(err);
                statusDiv.className = 'error';
                statusDiv.innerText = isAuto ? '자동 연결 실패. IP를 확인해주세요.' : '연결 실패: ' + (err.name === 'AbortError' ? '타임아웃 (네트워크 확인)' : err.message);
                connectBtn.disabled = false;
                connectBtn.innerText = '연결하기 (Connect)';
            }
        }

        // 엔터키 지원
        ipInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                testAndConnect();
            }
        });
    </script>
</body>

</html>
