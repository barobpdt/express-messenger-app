<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 메신저</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #1d6feb;
            --primary-hover: #388bfd;
            --msg-bg: #21262d;
            --msg-mine: #1d6feb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        #header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            z-index: 10;
        }

        #header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.connected {
            background: #22c55e;
        }

        /* Message Area */
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.mine {
            align-self: flex-end;
        }

        .message.others {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-all;
        }

        .message.mine .bubble {
            background: var(--msg-mine);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.others .bubble {
            background: var(--msg-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        .message.mine .meta {
            justify-content: flex-end;
        }

        /* File Links */
        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        /* Input Area */
        #input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            display: block;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 0.95rem;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            overflow: hidden;
            line-height: 1.4;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.secondary {
            background: var(--msg-bg);
            border: 1px solid var(--border);
        }

        .btn.secondary:hover {
            background: var(--border);
        }

        #file-input {
            display: none;
        }

        /* File Upload Progess overlay */
        #progress-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }

        .prog-wrap {
            width: 200px;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .prog-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.2s;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div id="header">
            <h1 style="display:flex; align-items:center; gap:8px;">
                <span id="status-dot" class="status-dot"></span>채팅방
                <span id="user-count"
                    style="font-size:0.75rem; background:var(--primary); color:white; padding:2px 8px; border-radius:12px; font-weight:normal; display:none;">1명</span>
            </h1>
            <div style="font-size:0.8rem; color:var(--text-muted); text-align:right; line-height:1.6">
                /open URL &nbsp;·&nbsp; /alert 메시지 &nbsp;·&nbsp; /screenshot &nbsp;·&nbsp; /sharescreen<br>
                <span style="font-size:0.72rem; opacity:0.7">/login &nbsp;|&nbsp; /cmd &nbsp;|&nbsp; /log &nbsp;|&nbsp;
                    /monitor [경로] &nbsp;|&nbsp; /unmonitor &nbsp;|&nbsp; 붙여넣기</span>
            </div>
        </div>

        <div id="messages">
            <!-- Messages will appear here -->
            <div class="message others">
                <div class="bubble">안녕하세요! 메신저에 접속하셨습니다. 파일 공유나 `/open https://naver.com` 같은 명령어를 입력해 보세요.</div>
                <div class="meta">System</div>
            </div>
        </div>

        <div id="input-area">
            <button class="btn secondary" onclick="document.getElementById('file-input').click()" title="파일 첨부">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                </svg>
            </button>
            <input type="file" id="file-input" onchange="handleFileUpload(event)">

            <textarea id="msg-input" placeholder="메시지 입력... (Enter로 전송)"></textarea>

            <button class="btn" onclick="sendMessage()" title="전송">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>

        <div id="progress-overlay">
            <div style="font-weight:600">파일 업로드 중...</div>
            <div class="prog-wrap">
                <div class="prog-bar" id="up-prog"></div>
            </div>
        </div>
    </div>

    <script>
        // 고유 ID 생성 (본인 메시지 구분을 위해)
        const myId = Math.random().toString(36).substring(2, 10);
        let ws;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            ws = new WebSocket(wsUrl);

            const statusDot = document.getElementById('status-dot');

            ws.onopen = () => {
                statusDot.classList.add('connected');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    receiveMessage(data);
                } catch (e) {
                    console.error("Failed to parse message", e);
                }
            };

            ws.onclose = () => {
                statusDot.classList.remove('connected');
                setTimeout(connectWebSocket, 3000); // Reconnect after 3s
            };
        }

        // 초기 연결
        connectWebSocket();

        // ─── UI 렌더링 ───
        const msgContainer = document.getElementById('messages');
        const inputEl = document.getElementById('msg-input');

        function appendMessageBubble(data) {
            const isMine = data.senderId === myId;
            const el = document.createElement('div');
            el.className = `message ${isMine ? 'mine' : 'others'}`;

            const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let contentHtml = '';
            if (data.type === 'text' || data.type === 'command') {
                // 텍스트는 이스케이프 (기본적인 XSS 방지)
                const safeText = data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                contentHtml = `<div class="bubble">${safeText.replace(/\n/g, '<br>')}</div>`;
            } else if (data.type === 'cmd-result') {
                contentHtml = `<div class="bubble" style="background:#000; color:#0f0; border-radius:8px; font-family:monospace; padding:12px; font-size:0.85rem; width:100%; overflow-x:auto;">
                    <div style="color:#888; margin-bottom:8px;">> ${data.cmd}</div>
                    <pre style="margin:0; white-space:pre-wrap;">${data.output.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>
                </div>`;
            } else if (data.type === 'file-monitor') {
                contentHtml = `<div class="bubble" style="background:#1e1e1e; color:#d4d4d4; border-radius:8px; font-family:monospace; padding:12px; font-size:0.85rem; width:100%; overflow-x:auto; border-left: 4px solid #4ade80;">
                    <div style="color:#888; margin-bottom:4px; font-size:0.75rem;">[${data.file}] 파일 업데이트됨</div>
                    <pre style="margin:0; white-space:pre-wrap;">${data.content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>
                </div>`;
            } else if (data.type === 'file') {
                const url = `/api/files/${data.file.id}`;
                const ext = data.file.name.split('.').pop().toLowerCase();
                const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);

                if (isImage) {
                    contentHtml = `
                        <div class="bubble" style="display:flex; flex-direction:column; gap:6px;">
                            <span style="font-size:0.8rem; color:${isMine ? '#bae6fd' : '#8b949e'}">🖼 이미지가 공유되었습니다</span>
                            <a href="${url}" target="_blank">
                                <img src="${url}" alt="${data.file.name}" style="max-width: 100%; max-height: 250px; border-radius: 8px; object-fit: contain; background: #000;">
                            </a>
                            <div style="font-size:0.75rem; text-align:right;">${data.file.name}</div>
                        </div>
                    `;
                } else {
                    contentHtml = `
                        <div class="bubble" style="display:flex; flex-direction:column; gap:6px;">
                            <span style="font-size:0.8rem; color:${isMine ? '#bae6fd' : '#8b949e'}">📁 파일이 공유되었습니다</span>
                            <a href="${url}" class="file-link" target="_blank" download="${data.file.name}">
                                💾 ${data.file.name}
                            </a>
                        </div>
                    `;
                }
            }

            el.innerHTML = `
                ${contentHtml}
                <div class="meta">
                    ${!isMine ? (data.senderId && data.senderId !== 'system' ? `<span>User-${String(data.senderId).substring(0, 4)}</span>` : `<span>System</span>`) : ''}
                    <span>${time}</span>
                </div>
            `;

            msgContainer.appendChild(el);
            scrollToBottom();
        }

        function scrollToBottom() {
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // ─── 명령어 히스토리 관리 ───
        const cmdHistory = [];
        let historyIndex = -1;

        // ─── 메시지 발송 ───
        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN) return;

            // 히스토리에 추가
            if (cmdHistory[cmdHistory.length - 1] !== text) {
                cmdHistory.push(text);
            }
            historyIndex = cmdHistory.length;

            const payload = {
                senderId: myId,
                timestamp: Date.now(),
                type: 'text',
                text: text
            };

            // 명령어 파싱 (/open URL, /alert MSG, /cmd CMD)
            if (text.startsWith('/')) {
                const parts = text.split(' ');
                const cmd = parts[0];
                const args = parts.slice(1).join(' ');

                if (cmd === '/login') {
                    const [username, password] = args.split(' ');
                    appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '로그인 확인 중...' });
                    fetch('/api/cmd/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    })
                        .then(res => res.json())
                        .then(resData => {
                            if (resData.success) {
                                window.cmdToken = resData.token;
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '✅ 로그인 성공. 이제 /cmd 명령어를 사용할 수 있습니다.' });
                            } else {
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: `❌ 로그인 실패: ${resData.error}` });
                            }
                        })
                        .catch(err => {
                            appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: `[Network Error] ${err.message}` });
                        });
                    inputEl.value = '';
                    inputEl.style.height = '40px';
                    inputEl.focus();
                    return;
                }

                if (cmd === '/logout') {
                    window.cmdToken = null;
                    appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '✅ 로그아웃 되었습니다. 토큰이 삭제되었습니다.' });
                    inputEl.value = '';
                    inputEl.style.height = '40px';
                    inputEl.focus();
                    return;
                }

                if (cmd === '/log') {
                    if (!args) {
                        appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '❌ 저장할 내용을 입력해주세요. (예: /log 오늘 회의내용)' });
                        inputEl.value = '';
                        inputEl.style.height = '40px';
                        inputEl.focus();
                        return;
                    }

                    appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'cmd-result', cmd: text, output: '로그 저장 중...' });
                    fetch('/api/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: args })
                    })
                        .then(res => res.json())
                        .then(resData => {
                            if (resData.success) {
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: text, output: `✅ [${resData.file}] 파일에 저장되었습니다.` });
                            } else {
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: text, output: `❌ 로그 저장 실패: ${resData.error}` });
                            }
                        })
                        .catch(err => {
                            appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: text, output: `[Network Error] ${err.message}` });
                        });
                    inputEl.value = '';
                    inputEl.style.height = '40px';
                    inputEl.focus();
                    return;
                }

                if (cmd === '/monitor' || cmd === '/unmonitor') {
                    if (!window.cmdToken) {
                        appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '❌ 로그인 먼저 해주세요. (사용법: /login id pw)' });
                        inputEl.value = '';
                        inputEl.style.height = '40px';
                        inputEl.focus();
                        return;
                    }

                    const action = cmd === '/monitor' ? 'start' : 'stop';
                    appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'cmd-result', cmd: args || '(오늘 날짜 로그)', output: `${cmd === '/monitor' ? '모니터링 시작 중...' : '모니터링 종료 중...'}` });

                    fetch('/api/monitor', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${window.cmdToken}`
                        },
                        body: JSON.stringify({ action: action, targetFile: args })
                    })
                        .then(res => res.json())
                        .then(resData => {
                            if (resData.success) {
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args || '(오늘 날짜 로그)', output: `✅ ${resData.message}` });
                            } else {
                                appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args || '(오늘 날짜 로그)', output: `❌ ${resData.error}` });
                            }
                        })
                        .catch(err => {
                            appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args || '(오늘 날짜 로그)', output: `[Network Error] ${err.message}` });
                        });
                    inputEl.value = '';
                    inputEl.style.height = '40px';
                    inputEl.focus();
                    return;
                }

                if (cmd === '/cmd') {
                    if (!window.cmdToken) {
                        appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '❌ 로그인 먼저 해주세요. (사용법: /login id pw)' });
                        inputEl.value = '';
                        inputEl.style.height = '40px';
                        inputEl.focus();
                        return;
                    }

                    // /cmd 는 로컬(백엔드)로 직접 API 호출하고 화면에 결과만 출력, 웹소켓 브로드캐스트 안 함
                    appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'cmd-result', cmd: args, output: '실행 중...' });
                    fetch('/api/cmd', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${window.cmdToken}`
                        },
                        body: JSON.stringify({ command: args })
                    })
                        .then(res => res.json())
                        .then(resData => {
                            // 결과 갱신 (마지막 메시지를 덮어쓰거나 새로 추가)
                            appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: resData.success ? resData.output : `[Error] ${resData.error}` });
                        })
                        .catch(err => {
                            appendMessageBubble({ senderId: 'system', timestamp: Date.now(), type: 'cmd-result', cmd: args, output: `[Network Error] ${err.message}` });
                        });

                    inputEl.value = '';
                    inputEl.style.height = '40px';
                    inputEl.focus();
                    return;
                }

                payload.type = 'command';
                payload.cmd = cmd;
                payload.args = args;
            }

            ws.send(JSON.stringify(payload));
            inputEl.value = '';
            inputEl.style.height = '40px'; // Reset height
            inputEl.focus();
        }

        // Enter 및 방향키 처리
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputEl.value = cmdHistory[historyIndex];
                    inputEl.dispatchEvent(new Event('input')); // 리사이즈 트리거
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    inputEl.value = cmdHistory[historyIndex];
                    inputEl.dispatchEvent(new Event('input'));
                } else {
                    historyIndex = cmdHistory.length;
                    inputEl.value = '';
                    inputEl.dispatchEvent(new Event('input'));
                }
            }
        });

        // 자동 리사이즈
        inputEl.addEventListener('input', function () {
            this.style.height = '40px';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';

            // 최대 높이 도달 시 스크롤 허용, 아닐 땐 숨김
            if (this.scrollHeight > 120) {
                this.style.overflowY = 'auto';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        // ─── 메시지 수신 및 명령어 실행 ───
        function receiveMessage(data) {
            if (data.type === 'userCount') {
                const countBadge = document.getElementById('user-count');
                countBadge.innerText = `${data.count}명 접속 중`;
                countBadge.style.display = 'inline-block';
                return;
            }

            if (data.type.startsWith('webrtc-')) {
                handleWebRTCSignaling(data);
                return;
            }

            appendMessageBubble(data);

            // 본인 메시지는 명령어를 실행하지 않음 (본인이 보낸 시점에 실행되도록 할 수도 있으나, 여기선 수신 시 일괄 처리로 하되 다른 사람 명령어로 내 브라우저 제어)
            // 재미를 위해 "누가 보냈든" 명령어를 실행하도록 허용 (단, /open 등)
            if (data.type === 'command' && data.senderId !== myId) {
                executeCommand(data.cmd, data.args);
            }
        }

        function executeCommand(cmd, args) {
            if (cmd === '/open' && args) {
                // 특정 URL 열기
                let url = args;
                if (!url.startsWith('http')) url = 'https://' + url;
                window.open(url, '_blank');
            } else if (cmd === '/alert' && args) {
                // 알림 띄우기
                alert(`🚨 알림: ${args}`);
            } else if (cmd === '/screenshot') {
                // 상대방이 /screenshot 커맨드를 보내면 내 화면을 캡처해서 공유
                captureScreen();
            } else if (cmd === '/sharescreen') {
                // 내가 /sharescreen 커맨드 입력 시 실시간 화면 스트리밍 시작
                startScreenShare();
            }
        }

        // ─── 화면 캡처 (/screenshot 커맨드) ───
        async function captureScreen() {
            if (!navigator.mediaDevices?.getDisplayMedia) {
                alert('이 브라우저에서는 화면 캡처를 지원하지 않습니다.');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                await new Promise(resolve => { video.onloadedmetadata = resolve; });
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `screenshot_${Date.now()}.png`, { type: 'image/png' });
                    await uploadAndShare(file);
                }, 'image/png', 0.9);
            } catch (err) {
                console.warn('화면 캡처 취소 또는 실패:', err);
            }
        }

        // ─── WebRTC 실시간 화면 공유 (/sharescreen 커맨드) ───
        const peerConnections = {}; // targetId -> RTCPeerConnection
        let localStream = null;

        async function startScreenShare() {
            if (!navigator.mediaDevices?.getDisplayMedia) {
                alert('이 브라우저에서는 화면 공유를 지원하지 않습니다.');
                return;
            }
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });

                // 시스템(브라우저)에서 공유 중지 버튼을 누를 경우 처리
                localStream.getVideoTracks()[0].onended = () => {
                    stopScreenShare();
                };

                // 다른 사용자들에게 방송 시작 알림
                ws.send(JSON.stringify({
                    type: 'webrtc-start',
                    senderId: myId,
                    timestamp: Date.now()
                }));

                appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'text', text: '✅ 실시간 화면 공유를 시작했습니다.' });

            } catch (err) {
                console.warn('화면 공유 취소 또는 실패:', err);
            }
        }

        function stopScreenShare() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            Object.values(peerConnections).forEach(pc => pc.close());
            for (let key in peerConnections) delete peerConnections[key];

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'webrtc-stop', senderId: myId }));
            }
            appendMessageBubble({ senderId: myId, timestamp: Date.now(), type: 'text', text: '🛑 실시간 화면 공유가 종료되었습니다.' });
        }

        function createPeerConnection(peerId) {
            if (peerConnections[peerId]) return peerConnections[peerId];

            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            peerConnections[peerId] = pc;

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    ws.send(JSON.stringify({
                        type: 'webrtc-ice',
                        targetId: peerId,
                        senderId: myId,
                        candidate: e.candidate
                    }));
                }
            };

            pc.ontrack = (e) => {
                let videoEl = document.getElementById(`video-${peerId}`);
                if (!videoEl) {
                    const msg = document.createElement('div');
                    msg.className = 'message others';
                    msg.innerHTML = `
                        <div class="bubble">
                            <span style="font-size:0.85rem; color:#bae6fd; font-weight:bold;">📺 실시간 화면 공유 (User-${peerId.substring(0, 4)})</span>
                            <video id="video-${peerId}" autoplay playsinline controls style="max-width: 100%; border-radius: 8px; margin-top: 10px; background: #000;"></video>
                        </div>
                    `;
                    msgContainer.appendChild(msg);
                    scrollToBottom();
                    videoEl = document.getElementById(`video-${peerId}`);
                }
                videoEl.srcObject = e.streams[0];
            };

            return pc;
        }

        async function handleWebRTCSignaling(data) {
            if (data.senderId === myId) return; // ignore my own messages

            try {
                if (data.type === 'webrtc-start') {
                    // Someone started broadcast, join automatically
                    ws.send(JSON.stringify({ type: 'webrtc-join', targetId: data.senderId, senderId: myId }));
                }
                else if (data.type === 'webrtc-join' && data.targetId === myId && localStream) {
                    // Someone wants to view my broadcast
                    const pc = createPeerConnection(data.senderId);
                    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    ws.send(JSON.stringify({ type: 'webrtc-offer', targetId: data.senderId, senderId: myId, offer }));
                }
                else if (data.type === 'webrtc-offer' && data.targetId === myId) {
                    // Broadcaster sent me an offer
                    const pc = createPeerConnection(data.senderId);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({ type: 'webrtc-answer', targetId: data.senderId, senderId: myId, answer }));
                }
                else if (data.type === 'webrtc-answer' && data.targetId === myId) {
                    // Viewer sent answer to my offer
                    const pc = peerConnections[data.senderId];
                    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                else if (data.type === 'webrtc-ice' && data.targetId === myId) {
                    // Received ICE candidate
                    const pc = peerConnections[data.senderId];
                    if (pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
                else if (data.type === 'webrtc-stop') {
                    // Broadcaster stopped sharing
                    const pc = peerConnections[data.senderId];
                    if (pc) {
                        pc.close();
                        delete peerConnections[data.senderId];
                    }
                    const videoEl = document.getElementById(`video-${data.senderId}`);
                    if (videoEl) {
                        videoEl.srcObject = null;
                        const bubble = videoEl.closest('.bubble');
                        if (bubble) {
                            bubble.innerHTML += '<div style="font-size:0.75rem; color:#ef4444; margin-top:8px;">❌ 화면 공유가 종료되었습니다.</div>';
                        }
                        videoEl.remove();
                    }
                }
            } catch (err) {
                console.error("WebRTC Signaling Error:", err);
            }
        }

        // ─── 파일 업로드 (공통) ───
        const progOverlay = document.getElementById('progress-overlay');
        const progBar = document.getElementById('up-prog');

        // 파일 업로드 + WebSocket 공유 공통 함수
        async function uploadAndShare(file) {
            const formData = new FormData();
            formData.append('file', file);

            progOverlay.style.display = 'flex';
            progBar.style.width = '0%';

            try {
                const result = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.upload.onprogress = e => {
                        if (e.lengthComputable) progBar.style.width = (e.loaded / e.total * 100) + '%';
                    };
                    xhr.onload = () => {
                        if (xhr.status < 300) resolve(JSON.parse(xhr.responseText));
                        else reject(new Error(xhr.responseText));
                    };
                    xhr.onerror = () => reject(new Error('네트워크 오류'));
                    xhr.open('POST', '/api/files');
                    xhr.send(formData);
                });

                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        senderId: myId,
                        timestamp: Date.now(),
                        type: 'file',
                        file: { id: result.fileId, name: result.name, size: result.size }
                    }));
                }
            } catch (err) {
                alert('파일 업로드에 실패했습니다. ' + err.message);
            } finally {
                progOverlay.style.display = 'none';
            }
        }

        // 파일 input (<input type="file">) 핸들러
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            await uploadAndShare(file);
            event.target.value = '';
        }

        // ─── 클립보드 이미지 붙여넣기 (Ctrl+V) ───
        inputEl.addEventListener('paste', async (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) await uploadAndShare(file);
                    break;
                }
            }
        });

        // ─── 모바일 가상 키보드 대응 (스크롤 및 레이아웃 조정) ───
        if (window.visualViewport) {
            const adjustHeight = () => {
                // 키보드 등장 시 안전하게 viewport 높이만큼 메인 레이아웃 제한
                document.body.style.height = window.visualViewport.height + 'px';
                scrollToBottom();
            };
            window.visualViewport.addEventListener('resize', adjustHeight);

            // 입력창 포커스 시 약간의 딜레이 후 강제 스크롤
            inputEl.addEventListener('focus', () => {
                setTimeout(scrollToBottom, 300);
            });

            // 초기 사이즈 설정
            adjustHeight();
        }

    </script>
</body>
