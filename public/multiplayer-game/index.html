<html>

<head>
  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      margin: 0;
      background: #94a3b8;
    }

    input::placeholder {
      color: #94a3b8;
    }

    canvas {
      width: 1024px;
      height: 576px;
      background-image: url('./img/webb-dark.png');
    }
  </style>
</head>

<body style="display: flex; align-items: center; justify-content: center">
  <div>
    <div style="
          position: absolute;
          color: white;
          padding: 8px;
          font-family: sans-serif;
          font-size: 14px;
          user-select: none;
          background: rgba(0, 0, 0, 0.5);
        ">
      <div style="margin-bottom: 8px">Leaderboard</div>
      <div id="playerLabels"></div>
    </div>
    <canvas></canvas>

    <!-- username and character input -->
    <div id="loginModal" style="
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          top: 0;
          right: 0;
          bottom: 0;
          left: 0;
          background: rgba(15, 23, 42, 0.8);
          backdrop-filter: blur(8px);
          z-index: 10;
        ">
      <form id="usernameForm" style="
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 320px;
            border: 1px solid #334155;
          ">
        <h2 style="color: white; margin-top: 0; margin-bottom: 24px; text-align: center; font-family: sans-serif;">Join Battle</h2>
        <div style="margin-bottom: 20px">
          <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; font-family: sans-serif; font-weight: bold;">Nickname</label>
          <input id="usernameInput" type="text" placeholder="Your Name" required style="
                width: 100%;
                padding: 14px;
                border-radius: 12px;
                border: 1px solid #334155;
                background: #0f172a;
                color: white;
                box-sizing: border-box;
                font-size: 16px;
                outline: none;
              " />
        </div>
        <div style="margin-bottom: 30px">
          <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; font-family: sans-serif; font-weight: bold;">Select Character</label>
          <select id="characterSelect" style="
                width: 100%;
                padding: 14px;
                border-radius: 12px;
                border: 1px solid #334155;
                background: #0f172a;
                color: white;
                box-sizing: border-box;
                font-size: 16px;
                outline: none;
                cursor: pointer;
              ">
            <option value="circle">Guardian (Circle)</option>
            <option value="square">Titan (Square)</option>
            <option value="triangle">Striker (Triangle)</option>
            <option value="star">Celestial (Star)</option>
          </select>
        </div>
        <div style="text-align: center">
          <button type="submit" style="
                width: 100%;
                padding: 14px;
                border-radius: 12px;
                border: none;
                background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
                color: white;
                font-weight: bold;
                font-size: 16px;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.2s;
              ">
            BATTLE START!
          </button>
        </div>
      </form>
    </div>

    <!-- Results Modal (Hidden by default) -->
    <div id="resultModal" style="
          display: none;
          align-items: center;
          justify-content: center;
          position: absolute;
          top: 0;
          right: 0;
          bottom: 0;
          left: 0;
          background: rgba(15, 23, 42, 0.9);
          backdrop-filter: blur(10px);
          z-index: 20;
        ">
      <div style="
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
            width: 400px;
            border: 1px solid #334155;
            text-align: center;
          ">
        <h1 id="resultTitle" style="color: #fbbf24; margin-top: 0; font-family: sans-serif;">YOU DIED!</h1>
        <div id="rankingList" style="margin: 24px 0; color: white; font-family: sans-serif; text-align: left;">
          <!-- Rankings will be injected here -->
        </div>
        <button onclick="location.reload()" style="
              width: 100%;
              padding: 14px;
              border-radius: 12px;
              border: 1px solid #334155;
              background: #0f172a;
              color: white;
              font-weight: bold;
              cursor: pointer;
            ">
          RETRY
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.2/gsap.min.js"
    integrity="sha512-kVlGhj2qFy+KBCFuvjBJTGUMxbdqJKs4yK2jh0e0VPhWUPiPC87bzm4THmaaIee3Oj7j6sDpTTgm2EPPiESqBg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="./js/frontend.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/common.js"></script>
  <script> checkMessenger() </script>
  
</body>

</html>
