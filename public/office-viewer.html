<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ 오피스파일 뷰어</title>
    <!-- jQuery (required for pptxjs) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- JSZip v2 for PPTX parsing (pptxjs requires v2) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.6.1/jszip.min.js"></script>
    <!-- Mammoth.js for Word (.docx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <!-- SheetJS for Excel (.xlsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- PPTXjs dependencies and styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/css/pptxjs.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/css/nv.d3.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/filereader.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/d3.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/nv.d3.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/pptxjs.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/divs2slides.js"></script>

    <!-- App specific -->
    <script src="./js/common.js"></script>
    <link rel="stylesheet" href="./css/ppt_whiteboard.css">
    <style>
        /* Override some styles for presentation mode */
        #slide-area {
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #pptx-result {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pptx-container {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background: white;
        }

        #placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #6b7280;
            z-index: 10;
        }

        .fullscreen #pptx-result,
        .fullscreen #doc-result,
        .fullscreen #xls-result {
            background: black;
        }

        #doc-result,
        #xls-result {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 40px;
            background: white;
        }

        #doc-result-inner,
        #xls-result-inner {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 40px;
            color: black;
            min-height: 100%;
        }

        #xls-result-inner table {
            width: 100%;
            border-collapse: collapse;
        }

        #xls-result-inner th,
        #xls-result-inner td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <div id="hdr">
            <div class="title">🖥️ 문서 프리젠테이션</div>
            <div class="hsp"></div>
            <label class="hbtn" style="cursor:pointer">
				📂 문서 파일 열기
				<input type="file" id="ppt-upload" accept=".pptx,.docx,.xlsx,.html" style="display:none">
			</label>
			<button class="hbtn" id="edit-mode-btn" title="텍스트 클릭 시 수정 가능">✏️ 편집 모드: OFF</button>
			<button class="hbtn" id="save-html-btn" title="현재 상태를 HTML로 다운로드">📥 HTML 저장</button>
			<button class="hbtn" id="fs-btn" title="전체화면">🖥 전체화면</button>
            <button class="hbtn red" onclick="location.reload()" title="새로고침">⚙</button>
        </div>

        <!-- Middle: Slide Area -->
        <div id="middle">
            <div id="slide-area">
                <div id="placeholder">
                    <div class="ico" style="font-size: 4rem; margin-bottom: 20px;">📂</div>
                    <div class="tx" style="font-size: 1.5rem; font-weight: bold;">Office 문서를 불러오세요</div>
                    <div class="hi" style="margin-top: 10px;">상단 "문서 파일 열기" 선택 (.pptx, .docx, .xlsx, .html 지원)</div>
                </div>
                <!-- JS Containers -->
                <div id="pptx-result"></div>
                <div id="doc-result" style="display:none;">
                    <div id="doc-result-inner"></div>
                </div>
                <div id="xls-result" style="display:none;">
                    <div id="xls-result-inner"></div>
                </div>
                <div id="html-result" style="display:none; width:100%; height:100%;">
                    <iframe id="html-result-frame" style="width:100%; height:100%; border:none; background:white;"></iframe>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div id="tb" style="justify-content: center;">
            <div class="nav-g">
                <button class="nbtn" id="btn-prev" disabled>◀</button>
                <span class="pinfo" id="pinfo" style="min-width: 60px; text-align: center;">0 / 0</span>
                <button class="nbtn" id="btn-next" disabled>▶</button>
            </div>
            <div class="sep"></div>
            <button class="abtn" id="mode-toggle" title="슬라이드/스크롤 모드 변경" style="margin-left:10px;">↕ 스크롤 뷰</button>
        </div>
    </div>

    <script src="./js/office_viewer.js"></script>
</body>

</html>
