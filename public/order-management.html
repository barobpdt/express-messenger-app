<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>주문 관리</title>
	<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
		rel="stylesheet" />
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		:root {
			--bg: #09090b;
			--surface: #141417;
			--border: #27272a;
			--text: #fafafa;
			--muted: #71717a;
			--purple: #a855f7;
			--blue: #3b82f6;
			--green: #22c55e;
			--yellow: #f59e0b;
			--red: #ef4444;
		}

		body {
			font-family: 'Pretendard', sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		header {
			background: linear-gradient(135deg, #1a0533, #0a0a1a, #001a33);
			padding: 16px 24px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-bottom: 1px solid var(--border);
			flex-shrink: 0;
		}

		header h1 {
			font-size: 1.2rem;
			font-weight: 800;
			background: linear-gradient(90deg, #c084fc, #60a5fa);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.nav-links {
			display: flex;
		}

		.nav-links>*+* {
			margin-left: 10px;
		}

		.nav-links a {
			padding: 6px 14px;
			border-radius: 8px;
			font-size: .8rem;
			font-weight: 600;
			text-decoration: none;
			color: var(--muted);
			border: 1px solid var(--border);
			transition: all .2s;
		}

		.nav-links a:hover,
		.nav-links a.active {
			border-color: var(--purple);
			color: var(--purple);
			background: #1a0533;
		}

		.app {
			display: flex;
			flex: 1;
			overflow: hidden;
		}

		/* ── 사이드바 ── */
		.sidebar {
			width: 260px;
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
			overflow: hidden;
		}

		.sidebar-tab {
			display: flex;
			border-bottom: 1px solid var(--border);
		}

		.tab-btn {
			flex: 1;
			padding: 10px;
			font-size: .78rem;
			font-weight: 700;
			background: none;
			border: none;
			color: var(--muted);
			cursor: pointer;
			border-bottom: 2px solid transparent;
			transition: all .2s;
		}

		.tab-btn.active {
			color: var(--purple);
			border-bottom-color: var(--purple);
			background: #1a0533;
		}

		.tab-pane {
			display: none;
			flex-direction: column;
			flex: 1;
			overflow: hidden;
		}

		.tab-pane.active {
			display: flex;
		}

		.side-list {
			overflow-y: auto;
			flex: 1;
		}

		.side-item {
			padding: 12px 16px;
			border-bottom: 1px solid var(--border);
			cursor: pointer;
			transition: background .15s;
			display: flex;
			align-items: center;
		}

		.side-item>*+* {
			margin-left: 10px;
		}

		.side-item:hover {
			background: #1f1f23;
		}

		.side-item.selected {
			background: #1c1028;
			border-left: 3px solid var(--purple);
		}

		.side-item .si-main {
			font-size: .85rem;
			font-weight: 600;
		}

		.side-item .si-sub {
			font-size: .72rem;
			color: var(--muted);
			margin-top: 2px;
		}

		.status-dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.dot-available {
			background: var(--green);
		}

		.dot-occupied {
			background: var(--purple);
		}

		.dot-reserved {
			background: var(--yellow);
		}

		.side-add {
			padding: 12px 16px;
			border-top: 1px solid var(--border);
		}

		.btn {
			padding: 9px 16px;
			border: none;
			border-radius: 8px;
			font-size: .82rem;
			font-weight: 600;
			cursor: pointer;
			font-family: inherit;
			transition: opacity .2s;
			width: 100%;
		}

		.btn:hover {
			opacity: .85;
		}

		.btn-primary {
			background: linear-gradient(90deg, #7c3aed, #2563eb);
			color: #fff;
		}

		.btn-green {
			background: #166534;
			color: var(--green);
		}

		.btn-red {
			background: #7f1d1d;
			color: var(--red);
			border: 1px solid #991b1b;
		}

		.btn-outline {
			background: none;
			border: 1px solid var(--border);
			color: var(--text);
		}

		.btn-sm {
			padding: 5px 12px;
			font-size: .76rem;
			width: auto;
		}

		/* ── 메인 패널 ── */
		.main-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.panel-header {
			padding: 16px 20px;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			flex-shrink: 0;
		}

		.panel-header>*+* {
			margin-left: 12px;
		}

		.panel-header h2 {
			font-size: 1rem;
			font-weight: 700;
		}

		.panel-header .hbadge {
			font-size: .7rem;
			padding: 3px 10px;
			border-radius: 99px;
			font-weight: 700;
		}

		.panel-body {
			flex: 1;
			overflow-y: auto;
			padding: 20px;
		}

		/* 주문 생성 */
		.menu-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
			gap: 12px;
			margin-bottom: 20px;
		}

		.menu-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px;
			cursor: pointer;
			transition: all .15s;
			display: flex;
			flex-direction: column;
		}

		.menu-card>*+* {
			margin-top: 4px;
		}

		.menu-card:hover {
			border-color: var(--purple);
			background: #1c1028;
		}

		.menu-card.in-cart {
			border-color: var(--green);
			background: #052e16;
		}

		.menu-card .mc-name {
			font-size: .85rem;
			font-weight: 600;
		}

		.menu-card .mc-price {
			font-size: .78rem;
			color: var(--green);
			font-weight: 600;
		}

		.menu-card .mc-cat {
			font-size: .68rem;
			color: var(--muted);
		}

		/* 장바구니 */
		.cart-section {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 16px;
		}

		.cart-section h3 {
			font-size: .88rem;
			font-weight: 700;
			margin-bottom: 12px;
			color: var(--purple);
		}

		.cart-item {
			display: flex;
			align-items: center;
			padding: 8px 0;
			border-bottom: 1px solid var(--border);
		}

		.cart-item>*+* {
			margin-left: 10px;
		}

		.cart-item:last-of-type {
			border-bottom: none;
		}

		.cart-item .ci-name {
			flex: 1;
			font-size: .83rem;
		}

		.cart-item .qty-ctrl {
			display: flex;
			align-items: center;
		}

		.qty-ctrl>*+* {
			margin-left: 6px;
		}

		.qty-ctrl button {
			width: 24px;
			height: 24px;
			border-radius: 6px;
			border: 1px solid var(--border);
			background: none;
			color: var(--text);
			cursor: pointer;
			font-size: .9rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.qty-ctrl button:hover {
			border-color: var(--purple);
			color: var(--purple);
		}

		.qty-ctrl .qty-num {
			font-size: .82rem;
			font-weight: 700;
			width: 20px;
			text-align: center;
		}

		.cart-item .ci-sub {
			font-size: .78rem;
			color: var(--green);
			font-weight: 600;
			width: 70px;
			text-align: right;
		}

		.ci-del {
			color: var(--red);
			cursor: pointer;
			font-size: .9rem;
		}

		.cart-total {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding-top: 12px;
			font-weight: 700;
		}

		.cart-total .total-label {
			color: var(--muted);
			font-size: .85rem;
		}

		.cart-total .total-price {
			font-size: 1.1rem;
			color: var(--green);
		}

		/* 주문 목록 */
		.order-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 14px 16px;
			margin-bottom: 10px;
		}

		.order-card-head {
			display: flex;
			align-items: center;
			margin-bottom: 8px;
		}

		.order-card-head>*+* {
			margin-left: 8px;
		}

		.order-card-head .oid {
			font-size: .7rem;
			color: var(--muted);
		}

		.order-card-head .otime {
			font-size: .7rem;
			color: var(--muted);
			margin-left: auto;
		}

		.order-card-items {
			font-size: .78rem;
			color: #a1a1aa;
			margin-bottom: 10px;
			line-height: 1.6;
		}

		.order-card-foot {
			display: flex;
			align-items: center;
		}

		.order-card-foot>*+* {
			margin-left: 8px;
		}

		.order-card-foot .total {
			margin-left: auto;
			font-size: .88rem;
			font-weight: 700;
			color: var(--green);
		}

		.badge {
			font-size: .65rem;
			padding: 2px 8px;
			border-radius: 99px;
			font-weight: 700;
		}

		.badge-pending {
			background: #1c1400;
			color: var(--yellow);
		}

		.badge-confirmed {
			background: #1e3a5f;
			color: var(--blue);
		}

		.badge-served {
			background: #052e16;
			color: var(--green);
		}

		.badge-paid {
			background: #27272a;
			color: var(--muted);
		}

		.status-btns {
			display: flex;
			flex-wrap: wrap;
			margin-top: 6px;
		}

		.status-btns>*+* {
			margin-left: 6px;
		}

		.status-btn {
			font-size: .68rem;
			padding: 3px 10px;
			border-radius: 99px;
			font-weight: 700;
			border: 1px solid;
			background: none;
			cursor: pointer;
			font-family: inherit;
			transition: all .15s;
		}

		.status-btn:hover {
			opacity: .8;
		}

		.status-btn.confirmed {
			border-color: var(--blue);
			color: var(--blue);
		}

		.status-btn.served {
			border-color: var(--green);
			color: var(--green);
		}

		.status-btn.paid {
			border-color: var(--muted);
			color: var(--muted);
		}

		/* 모달 */
		.modal-overlay {
			position: fixed;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			background: rgba(0, 0, 0, .7);
			z-index: 100;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity .2s;
		}

		.modal-overlay.show {
			opacity: 1;
			pointer-events: all;
		}

		.modal {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 24px;
			width: 90%;
			max-width: 420px;
		}

		.modal h2 {
			font-size: 1rem;
			font-weight: 700;
			margin-bottom: 16px;
		}

		.form-group {
			margin-bottom: 12px;
		}

		.form-group label {
			font-size: .75rem;
			color: var(--muted);
			display: block;
			margin-bottom: 5px;
		}

		.form-group input,
		.form-group select {
			width: 100%;
			background: var(--bg);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text);
			padding: 9px 12px;
			font-size: .85rem;
			outline: none;
			font-family: inherit;
		}

		.form-group input:focus,
		.form-group select:focus {
			border-color: var(--purple);
		}

		.modal-footer {
			display: flex;
			margin-top: 16px;
		}

		.modal-footer>*+* {
			margin-left: 8px;
		}

		/* Misc */
		.empty {
			text-align: center;
			color: var(--muted);
			font-size: .82rem;
			padding: 32px;
		}

		.spinner {
			width: 18px;
			height: 18px;
			border: 3px solid var(--border);
			border-top-color: var(--purple);
			border-radius: 50%;
			animation: spin .7s linear infinite;
			display: inline-block;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		::-webkit-scrollbar {
			width: 4px;
		}

		::-webkit-scrollbar-thumb {
			background: var(--border);
			border-radius: 99px;
		}

		/* ── 주문 상세 팝업 ── */
		.detail-overlay {
			position: fixed;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			background: rgba(0, 0, 0, .75);
			z-index: 200;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity .2s;
		}

		.detail-overlay.show {
			opacity: 1;
			pointer-events: all;
		}

		.detail-box {
			background: #18181b;
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 0;
			width: 92%;
			max-width: 480px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
			overflow: hidden;
		}

		.detail-head {
			padding: 18px 20px 14px;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
		}

		.detail-head>*+* {
			margin-left: 10px;
		}

		.detail-head h3 {
			font-size: 1rem;
			font-weight: 700;
			flex: 1;
		}

		.detail-head .close-btn {
			background: none;
			border: 1px solid var(--border);
			border-radius: 6px;
			color: var(--muted);
			padding: 4px 10px;
			cursor: pointer;
			font-size: .8rem;
			width: auto;
			margin-top: 0;
		}

		.detail-body {
			padding: 16px 20px;
			max-height: 60vh;
			overflow-y: auto;
		}

		.detail-item {
			display: flex;
			align-items: center;
			padding: 9px 0;
			border-bottom: 1px solid var(--border);
			font-size: .85rem;
		}

		.detail-item>*+* {
			margin-left: 8px;
		}

		.detail-item:last-child {
			border-bottom: none;
		}

		.di-name {
			flex: 1;
			font-weight: 500;
		}

		.di-qty {
			color: var(--muted);
			min-width: 40px;
			text-align: center;
			font-size: .78rem;
		}

		.di-price {
			color: var(--muted);
			min-width: 70px;
			text-align: right;
			font-size: .78rem;
		}

		.di-sub {
			color: var(--green);
			min-width: 80px;
			text-align: right;
			font-weight: 600;
		}

		.detail-foot {
			padding: 14px 20px;
			border-top: 1px solid var(--border);
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.detail-foot .df-label {
			font-size: .82rem;
			color: var(--muted);
		}

		.detail-foot .df-total {
			font-size: 1.1rem;
			font-weight: 700;
			color: var(--green);
		}
	</style>
	<link rel="stylesheet" href="/css/pretendard.css">
</head>

<body>
	<header>
		<h1>🍽️ 주문 관리</h1>
		<nav class="nav-links">
			<a href="dashboard.html">대시보드</a>
			<a href="order-management.html" class="active">주문 관리</a>
		</nav>
	</header>

	<div class="app">
		<!-- ── 사이드바 ── -->
		<aside class="sidebar">
			<div class="sidebar-tab">
				<button class="tab-btn active" onclick="switchTab('tables')">🪑 테이블</button>
				<button class="tab-btn" onclick="switchTab('menu')">🍽️ 메뉴</button>
			</div>

			<!-- 테이블 탭 -->
			<div class="tab-pane active" id="tab-tables">
				<div class="side-list" id="table-list"></div>
				<div class="side-add">
					<button class="btn btn-outline" onclick="openAddTable()">+ 테이블 추가</button>
				</div>
			</div>

			<!-- 메뉴 탭 -->
			<div class="tab-pane" id="tab-menu">
				<div style="padding:10px 16px;">
					<select id="cat-filter" onchange="loadMenu()"
						style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:.8rem;font-family:inherit;">
						<option value="">전체 카테고리</option>
					</select>
				</div>
				<div class="side-list" id="menu-side-list"></div>
				<div class="side-add" style="display:flex;flex-direction:column;">
					<button class="btn btn-outline" onclick="openAddMenu()">+ 메뉴 추가</button>
					<button class="btn btn-outline btn-sm" style="width:auto;margin-top:6px" onclick="openAddCat()">+
						카테고리</button>
				</div>
			</div>
		</aside>

		<!-- ── 메인 패널 ── -->
		<div class="main-panel">
			<div class="panel-header" id="panel-header">
				<h2>테이블을 선택하세요</h2>
			</div>
			<div class="panel-body" id="panel-body">
				<div class="empty">왼쪽에서 테이블을 선택하면 주문을 관리할 수 있습니다.</div>
			</div>
		</div>
	</div>

	<!-- ── 모달 ── -->
	<div class="modal-overlay" id="modal">
		<div class="modal">
			<h2 id="modal-title"></h2>
			<div id="modal-body"></div>
			<div class="modal-footer">
				<button class="btn btn-primary" id="modal-confirm">확인</button>
				<button class="btn btn-outline" onclick="closeModal()">취소</button>
			</div>
		</div>
	</div>

	<!-- ── 주문 상세 팝업 ── -->
	<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
		<div class="detail-box">
			<div class="detail-head">
				<h3 id="detail-title">주문 상세</h3>
				<span id="detail-badge" class="badge"></span>
				<button class="close-btn" onclick="closeDetail()">✕ 닫기</button>
			</div>
			<div class="detail-body" id="detail-body"></div>
			<div class="detail-foot">
				<span class="df-label">합계</span>
				<span class="df-total" id="detail-total">0원</span>
			</div>
		</div>
	</div>

	<script>
		const API = "/api/order";
		async function get(p) { return (await fetch(API + p)).json(); }
		async function post(p, d) { return (await fetch(API + p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(d) })).json(); }
		async function patch(p, d) { return (await fetch(API + p, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(d) })).json(); }
		async function del(p) { return (await fetch(API + p, { method: "DELETE" })).json(); }

		let tables = [], menus = [], categories = [], selectedTable = null, cart = [];

		// ── 초기 로드 ──────────────────────────────────────────────────────────────
		async function init() {
			[tables, menus, categories] = await Promise.all([get("/tables"), get("/menu"), get("/categories")]);
			renderTableList(); renderMenuSide(); buildCatFilter();
		}

		// ── 탭 전환 ────────────────────────────────────────────────────────────────
		function switchTab(t) {
			document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", [...'tables,menu'.split(",")][i] === t || b.textContent.includes(t === "tables" ? "테이블" : "메뉴")));
			document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
			document.getElementById("tab-" + t).classList.add("active");
		}

		// ── 테이블 목록 ────────────────────────────────────────────────────────────
		function renderTableList() {
			const el = document.getElementById("table-list");
			el.innerHTML = tables.map(t => `
	<div class="side-item${selectedTable?.id === t.id ? " selected" : ""}" onclick="selectTable(${t.id})">
	<span class="status-dot dot-${t.status}"></span>
	<div>
		<div class="si-main">${t.tableNumber}번 테이블</div>
		<div class="si-sub">${{ "available": "빈 테이블", "occupied": "사용 중", "reserved": "예약" }[t.status]} · ${t.capacity}인</div>
	</div>
	</div>`).join("") || "<div class='empty'>테이블 없음</div>";
		}

		// ── 테이블 선택 ────────────────────────────────────────────────────────────
		async function selectTable(id) {
			selectedTable = tables.find(t => t.id === id);
			cart = [];
			renderTableList();
			await renderPanel();
		}

		async function renderPanel() {
			if (!selectedTable) return;
			const t = selectedTable;
			const statusLabel = { available: "빈 테이블", occupied: "사용 중", reserved: "예약" };
			const badgeClass = { available: "badge-served", occupied: "badge-pending", reserved: "badge-confirmed" };
			document.getElementById("panel-header").innerHTML = `
	<h2>${t.tableNumber}번 테이블</h2>
	<span class="hbadge ${badgeClass[t.status]}">${statusLabel[t.status]}</span>
	<span style="font-size:.75rem;color:var(--muted)">${t.capacity}인석</span>
	<button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="deleteTable(${t.id})">삭제</button>
`;

			const orders = await get(`/orders/table/${t.id}`);
			const activeOrders = orders.filter(o => o.status !== "paid");

			let html = "";

			// 주문 생성 (사용 중일 때 + 빈 테이블일 때 모두)
			html += `<div style="margin-bottom:20px">
	<div style="font-size:.88rem;font-weight:700;margin-bottom:12px;color:var(--purple)">
	${t.status === "available" ? "🛒 새 주문 만들기" : "➕ 추가 주문"}
	</div>
	<div class="menu-grid" id="menu-grid">${renderMenuGrid()}</div>
	<div id="cart-panel"></div>
</div>`;

			// 진행 중인 주문
			if (activeOrders.length) {
				const summaryBtn = `<button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="openTableSummary(${t.id})">📊 통합 보기</button>`;
				html += `<div style="font-size:.88rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center">📋 진행 중인 주문 (${activeOrders.length}건)${summaryBtn}</div>`;
				html += activeOrders.map(o => renderOrderCard(o)).join("");
			}


			document.getElementById("panel-body").innerHTML = html;
			renderCart();
		}

		function renderMenuGrid() {
			return menus.map(m => {
				const inCart = cart.find(c => c.menuItemId === m.id);
				return `<div class="menu-card${inCart ? " in-cart" : ""}" onclick="addToCart(${m.id})">
	<div class="mc-cat">${categories.find(c => c.id === m.category_id)?.name || ""}</div>
	<div class="mc-name">${m.name}</div>
	<div class="mc-price">${m.price.toLocaleString()}원</div>
	</div>`;
			}).join("") || "<p style='color:var(--muted);font-size:.8rem'>메뉴가 없습니다.</p>";
		}

		function addToCart(menuItemId) {
			const menu = menus.find(m => m.id === menuItemId);
			const existing = cart.find(c => c.menuItemId === menuItemId);
			if (existing) existing.quantity++;
			else cart.push({ menuItemId, name: menu.name, price: menu.price, quantity: 1 });
			// 메뉴 그리드 업데이트
			const grid = document.getElementById("menu-grid");
			if (grid) grid.innerHTML = renderMenuGrid();
			renderCart();
		}

		function renderCart() {
			const el = document.getElementById("cart-panel");
			if (!el) return;
			if (!cart.length) { el.innerHTML = ""; return; }
			const total = cart.reduce((s, c) => s + c.price * c.quantity, 0);
			el.innerHTML = `<div class="cart-section">
	<h3>🛒 장바구니</h3>
	${cart.map((c, i) => `
	<div class="cart-item">
		<span class="ci-name">${c.name}</span>
		<div class="qty-ctrl">
		<button onclick="changeQty(${i},-1)">−</button>
		<span class="qty-num">${c.quantity}</span>
		<button onclick="changeQty(${i},1)">+</button>
		</div>
		<span class="ci-sub">${(c.price * c.quantity).toLocaleString()}원</span>
		<span class="ci-del" onclick="removeCart(${i})">✕</span>
	</div>`).join("")}
	<div class="cart-total">
	<span class="total-label">합계</span>
	<span class="total-price">${total.toLocaleString()}원</span>
	</div>
	<button class="btn btn-green" style="margin-top:12px" onclick="submitOrder()">📤 주문 전송</button>
</div>`;
		}

		function changeQty(i, d) {
			cart[i].quantity += d;
			if (cart[i].quantity <= 0) cart.splice(i, 1);
			const grid = document.getElementById("menu-grid");
			if (grid) grid.innerHTML = renderMenuGrid();
			renderCart();
		}
		function removeCart(i) { cart.splice(i, 1); const g = document.getElementById("menu-grid"); if (g) g.innerHTML = renderMenuGrid(); renderCart(); }

		async function submitOrder() {
			if (!cart.length || !selectedTable) return;
			const res = await post("/orders", { tableId: selectedTable.id, items: cart.map(c => ({ menuItemId: c.menuItemId, quantity: c.quantity })) });
			if (res.id) { cart = []; tables = await get("/tables"); selectedTable = tables.find(t => t.id === selectedTable.id); await renderPanel(); renderTableList(); }
			else alert("주문 실패: " + JSON.stringify(res));
		}

		function renderOrderCard(o) {
			const labels = { "pending": "대기", "confirmed": "확인", "served": "서빙", "paid": "결제" };
			const time = new Date(o.createdAt).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
			return `<div class="order-card">
	<div class="order-card-head">
		<span class="oid">#${o.id}</span>
		<span class="badge badge-${o.status}">${labels[o.status]}</span>
		<span class="otime">${time}</span>
		<button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="openOrderDetail(${o.id})">🔍 상세</button>
	</div>
	<div class="order-card-foot">
		<div class="status-btns">
			<button class="status-btn confirmed" onclick="updateStatus(${o.id},'confirmed')">✅ 확인</button>
			<button class="status-btn served"    onclick="updateStatus(${o.id},'served')">🍽️ 서빙</button>
			<button class="status-btn paid"      onclick="updateStatus(${o.id},'paid')">💳 결제</button>
		</div>
		<span class="total">${o.totalAmount.toLocaleString()}원</span>
	</div>
</div>`;
		}

		// ── 주문 상세 팝업 ────────────────────────────────────────────────────────
		async function openOrderDetail(orderId) {
			const detailLabels = { pending: "대기", confirmed: "확인", served: "서빙", paid: "결제" };
			const badgeClass = { pending: "badge-pending", confirmed: "badge-confirmed", served: "badge-served", paid: "badge-paid" };

			// 로딩 표시
			document.getElementById('detail-title').textContent = `주문 #${orderId}`;
			document.getElementById('detail-badge').textContent = '';
			document.getElementById('detail-body').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
			document.getElementById('detail-total').textContent = '—';
			document.getElementById('detail-overlay').classList.add('show');

			try {
				const order = await get(`/orders/${orderId}`);
				const badge = document.getElementById('detail-badge');
				badge.textContent = detailLabels[order.status];
				badge.className = `badge ${badgeClass[order.status]}`;

				const time = new Date(order.createdAt).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
				document.getElementById('detail-title').textContent = `주문 #${orderId}  ·  ${time}`;

				if (!order.items?.length) {
					document.getElementById('detail-body').innerHTML = '<div class="empty">주문 항목이 없습니다.</div>';
				} else {
					document.getElementById('detail-body').innerHTML = order.items.map(item => `
						<div class="detail-item">
							<span class="di-name">${item.name || '알 수 없는 메뉴'}</span>
							<span class="di-qty">${item.quantity}개</span>
							<span class="di-price">${item.unitPrice.toLocaleString()}원</span>
							<span class="di-sub">${item.subtotal.toLocaleString()}원</span>
						</div>`).join('');
				}
				document.getElementById('detail-total').textContent = `${order.totalAmount.toLocaleString()}원`;
			} catch (e) {
				document.getElementById('detail-body').innerHTML = '<div class="empty">불러오기 실패</div>';
			}
		}
		function closeDetail() {
			document.getElementById('detail-overlay').classList.remove('show');
		}

		// ── 테이블 전체 주문 통합 보기 (메뉴별 수량 합산) ───────────────────────────
		async function openTableSummary(tableId) {
			document.getElementById('detail-title').textContent = `${selectedTable?.tableNumber || ''}번 테이블 · 전체 주문 통합`;
			document.getElementById('detail-badge').textContent = '';
			document.getElementById('detail-badge').className = 'badge';
			document.getElementById('detail-body').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
			document.getElementById('detail-total').textContent = '—';
			document.getElementById('detail-overlay').classList.add('show');

			try {
				// 활성 주문 목록 조회
				const orders = await get(`/orders/table/${tableId}`);
				const activeOrders = orders.filter(o => o.status !== 'paid');

				if (!activeOrders.length) {
					document.getElementById('detail-body').innerHTML = '<div class="empty">진행 중인 주문이 없습니다.</div>';
					document.getElementById('detail-total').textContent = '0원';
					return;
				}

				// 각 주문 상세를 병렬 조회
				const details = await Promise.all(activeOrders.map(o => get(`/orders/${o.id}`)));

				// menuItemId 기준 수량·소계 합산
				const merged = new Map();
				for (const order of details) {
					for (const item of (order.items || [])) {
						if (merged.has(item.menuItemId)) {
							const m = merged.get(item.menuItemId);
							m.quantity += item.quantity;
							m.subtotal += item.subtotal;
						} else {
							merged.set(item.menuItemId, {
								name: item.name || '알 수 없는 메뉴',
								unitPrice: item.unitPrice,
								quantity: item.quantity,
								subtotal: item.subtotal,
							});
						}
					}
				}

				const grandTotal = [...merged.values()].reduce((s, m) => s + m.subtotal, 0);
				const totalQty = [...merged.values()].reduce((s, m) => s + m.quantity, 0);

				if (!merged.size) {
					document.getElementById('detail-body').innerHTML = '<div class="empty">주문 항목이 없습니다.</div>';
				} else {
					const sorted = [...merged.values()].sort((a, b) => b.subtotal - a.subtotal);
					document.getElementById('detail-body').innerHTML =
						`<div style="font-size:.72rem;color:var(--muted);margin-bottom:10px">` +
						`${activeOrders.length}건 주문 합산 · 총 ${totalQty}개 항목</div>` +
						sorted.map(item => `
							<div class="detail-item">
								<span class="di-name">${item.name}</span>
								<span class="di-qty">${item.quantity}개</span>
								<span class="di-price">${item.unitPrice.toLocaleString()}원</span>
								<span class="di-sub">${item.subtotal.toLocaleString()}원</span>
							</div>`).join('');
				}
				document.getElementById('detail-total').textContent = `${grandTotal.toLocaleString()}원`;

			} catch (e) {
				document.getElementById('detail-body').innerHTML = '<div class="empty">불러오기 실패</div>';
			}
		}

		async function updateStatus(orderId, status) {
			await patch(`/orders/${orderId}/status`, { status });
			tables = await get("/tables");
			selectedTable = tables.find(t => t.id === selectedTable.id);
			await renderPanel(); renderTableList();
		}

		// ── 메뉴 사이드바 ──────────────────────────────────────────────────────────
		function renderMenuSide() {
			const catId = parseInt(document.getElementById("cat-filter")?.value) || 0;
			const filtered = catId ? menus.filter(m => m.categoryId === catId) : menus;
			document.getElementById("menu-side-list").innerHTML = filtered.map(m => `
	<div class="side-item">
	<div>
		<div class="si-main">${m.name}</div>
		<div class="si-sub">${m.price.toLocaleString()}원 · ${categories.find(c => c.id === m.categoryId)?.name || ""}</div>
	</div>
	<button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="deleteMenu(${m.id})">삭제</button>
	</div>`).join("") || "<div class='empty'>메뉴 없음</div>";
		}
		async function loadMenu() { menus = await get("/menu"); renderMenuSide(); }
		async function deleteMenu(id) { if (confirm("삭제하시겠습니까?")) { await del(`/menu/${id}`); await loadMenu(); } }
		async function deleteTable(id) {
			if (confirm("테이블을 삭제하시겠습니까?")) {
				await del(`/tables/${id}`);
				tables = await get("/tables");
				selectedTable = null;
				renderTableList();
				document.getElementById("panel-header").innerHTML = "<h2>테이블을 선택하세요</h2>";
				document.getElementById("panel-body").innerHTML = "<div class='empty'>왼쪽에서 테이블을 선택하세요.</div>";
			}
		}

		function buildCatFilter() {
			const sel = document.getElementById("cat-filter");
			sel.innerHTML = `<option value="">전체 카테고리</option>` + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
		}

		// ── 모달 ──────────────────────────────────────────────────────────────────
		function openModal(title, bodyHtml, onConfirm) {
			document.getElementById("modal-title").textContent = title;
			document.getElementById("modal-body").innerHTML = bodyHtml;
			document.getElementById("modal-confirm").onclick = onConfirm;
			document.getElementById("modal").classList.add("show");
		}
		function closeModal() { document.getElementById("modal").classList.remove("show"); }

		function openAddTable() {
			openModal("테이블 추가",
				`<div class="form-group"><label>테이블 번호</label><input id="f-tnum" type="number" placeholder="예: 5" /></div>
	<div class="form-group"><label>수용 인원</label><input id="f-cap" type="number" value="4" /></div>`,
				async () => {
					const tableNumber = parseInt(document.getElementById("f-tnum").value);
					const capacity = parseInt(document.getElementById("f-cap").value) || 4;
					if (!tableNumber) return;
					await post("/tables", { tableNumber, capacity });
					tables = await get("/tables"); renderTableList(); closeModal();
				});
		}

		function openAddCat() {
			openModal("카테고리 추가",
				`<div class="form-group"><label>카테고리명</label><input id="f-cname" placeholder="예: 주류" /></div>`,
				async () => {
					const name = document.getElementById("f-cname").value.trim();
					if (!name) return;
					await post("/categories", { name }); categories = await get("/categories"); buildCatFilter(); closeModal();
				});
		}

		function openAddMenu() {
			const currentCatId = parseInt(document.getElementById("cat-filter")?.value) || 0
			if (currentCatId == 0) {
				alert("카테고리를 선택해주세요.");
				return;
			}
			openModal("메뉴 추가",
				`<div class="form-group"><label>카테고리</label>
	<select id="f-mcat">${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("")}</select></div>
	<div class="form-group"><label>메뉴명</label><input id="f-mname" placeholder="예: 소주" /></div>
	<div class="form-group"><label>가격 (원)</label><input id="f-mprice" type="number" placeholder="예: 5000" /></div>
	<div class="form-group"><label>설명 (선택)</label><input id="f-mdesc" placeholder="설명" /></div>`,
				async () => {
					const categoryId = parseInt(document.getElementById("f-mcat").value);
					const name = document.getElementById("f-mname").value.trim();
					const price = parseInt(document.getElementById("f-mprice").value);
					const description = document.getElementById("f-mdesc").value.trim();
					if (!name || !price) return;
					await post("/menu", { categoryId, name, price, description });
					menus = await get("/menu"); renderMenuSide(); closeModal();
				});
			if (currentCatId > 0) {
				document.getElementById("f-mcat").value = currentCatId;
			}
		}
		document.getElementById("modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });
		init();
	</script>
</body>

</html>
