<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📄 PDF 뷰어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#c9d1d9;--muted:#8b949e;--primary:#6366f1;--hh:50px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;}

/* ── Toolbar ── */
#toolbar{
  height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;
  overflow-x:auto;z-index:100;
}
#toolbar .title{font-weight:700;font-size:.9rem;white-space:nowrap;margin-right:4px;}
.tsep{width:1px;height:26px;background:var(--border);margin:0 3px;flex-shrink:0;}
.tbtn{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);cursor:pointer;font-size:.8rem;
  transition:.15s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
}
.tbtn:hover{background:var(--border);}
.tbtn:disabled{opacity:.35;cursor:default;}
.tbtn.active{background:rgba(99,102,241,.2);border-color:var(--primary);color:#818cf8;}
.open-label{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);cursor:pointer;font-size:.8rem;
  transition:.15s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
}
.open-label:hover{background:var(--border);}
#url-in{
  width:220px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--text);font-size:.8rem;outline:none;flex-shrink:0;
}
#url-in:focus{border-color:var(--primary);}
#url-in::placeholder{color:var(--muted);}
.page-in{
  width:46px;text-align:center;background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;padding:4px 6px;color:var(--text);font-size:.82rem;outline:none;
}
.page-in:focus{border-color:var(--primary);}
#zoom-in-val{
  width:52px;text-align:center;background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;padding:4px;color:var(--text);font-size:.82rem;outline:none;
}
#total-pages{font-size:.82rem;color:var(--muted);white-space:nowrap;}
.hsp{flex:1;}

/* ── Layout ── */
#app{display:flex;height:calc(100vh - var(--hh));overflow:hidden;}

/* ── Sidebar (thumbnails) ── */
#sidebar{
  width:160px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:6px;
  transition:width .2s;
}
#sidebar.hidden{width:0;padding:0;overflow:hidden;}
.thumb-item{
  border:2px solid transparent;border-radius:6px;cursor:pointer;overflow:hidden;
  background:var(--bg3);transition:.15s;position:relative;
}
.thumb-item:hover{border-color:var(--border);}
.thumb-item.active{border-color:var(--primary);}
.thumb-item canvas{width:100%;display:block;}
.thumb-pg{
  position:absolute;bottom:0;left:0;right:0;text-align:center;
  font-size:.68rem;color:#fff;background:rgba(0,0,0,.55);padding:2px 0;
}

/* ── Main viewer ── */
#main{flex:1;overflow:auto;background:#525659;display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:14px;}

/* ── Page canvas ── */
.page-wrap{position:relative;box-shadow:0 4px 20px rgba(0,0,0,.6);line-height:0;}
.page-wrap canvas{display:block;}
.page-wrap .pg-badge{
  position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.55);
  color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px;pointer-events:none;
  backdrop-filter:blur(2px);
}

/* ── Empty / Loading ── */
#drop-zone{
  width:100%;flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;color:var(--muted);cursor:pointer;
  border:2px dashed transparent;transition:.2s;padding:40px;
}
#drop-zone.over{border-color:var(--primary);background:rgba(99,102,241,.05);}
#drop-zone .ico{font-size:3.5rem;}
#drop-zone .tx{font-size:1rem;font-weight:500;}
#drop-zone .hint{font-size:.82rem;color:#4b5563;text-align:center;}
#loading-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
#loading-overlay.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.35);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--primary);}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="title">📄 PDF 뷰어</span>
  <label class="open-label" title="파일 열기">
    📂 열기
    <input type="file" accept="application/pdf" style="display:none" id="file-input">
  </label>
  <input id="url-in" type="text" placeholder="PDF URL 또는 서버 경로 입력 후 Enter">
  <div class="tsep"></div>
  <button class="tbtn" id="prev-btn" onclick="changePage(-1)" disabled>◀</button>
  <input class="page-in" id="page-in" type="number" min="1" value="1">
  <span id="total-pages">/ 0</span>
  <button class="tbtn" id="next-btn" onclick="changePage(1)" disabled>▶</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="zoom(-0.25)">🔍−</button>
  <input id="zoom-in-val" type="text" value="100%" readonly title="현재 배율">
  <button class="tbtn" onclick="zoom(0.25)">🔍+</button>
  <button class="tbtn" onclick="setScale('fit-width')" title="너비에 맞춤">↔ 폭</button>
  <button class="tbtn" onclick="setScale('fit-page')" title="페이지에 맞춤">⊡ 전체</button>
  <div class="tsep"></div>
  <button class="tbtn" id="thumb-btn" onclick="toggleSidebar()" title="썸네일 보기" class="active">🗂 썸네일</button>
  <button class="tbtn" onclick="toggleFullscreen()" title="전체화면">⛶</button>
  <div class="hsp"></div>
  <button class="tbtn" id="dl-btn" onclick="downloadPDF()" disabled title="다운로드">⬇ 다운로드</button>
</div>

<div id="app">
  <!-- Thumbnail Sidebar -->
  <div id="sidebar"></div>

  <!-- Main View -->
  <div id="main">
    <div id="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)" onclick="document.getElementById('file-input').click()">
      <div class="ico">📄</div>
      <div class="tx">PDF 파일을 열거나 드래그하세요</div>
      <div class="hint">파일 열기 버튼, URL 입력, 또는 이 영역에 드래그&드롭<br>서버 파일: /uploads/doc.pdf 형태로 입력</div>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:.9rem">불러오는 중...</span>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let _pdf     = null;
let _page    = 1;
let _scale   = 1.2;
let _scaleMode = 'custom'; // 'fit-width' | 'fit-page' | 'custom'
let _rendering = false;
let _pdfUrl  = null;
let _sidebarOpen = true;
let _thumbRendered = false;

const $main    = document.getElementById('main');
const $sidebar = document.getElementById('sidebar');
const $prevBtn = document.getElementById('prev-btn');
const $nextBtn = document.getElementById('next-btn');
const $pageIn  = document.getElementById('page-in');
const $total   = document.getElementById('total-pages');
const $zoomVal = document.getElementById('zoom-in-val');
const $dlBtn   = document.getElementById('dl-btn');
const $dropZone= document.getElementById('drop-zone');
const $loading = document.getElementById('loading-overlay');

// ── Load ──
async function loadPDF(src) {
  $loading.classList.add('show');
  _thumbRendered = false;
  try {
    const loadingTask = typeof src === 'string'
      ? pdfjsLib.getDocument(src)
      : pdfjsLib.getDocument({ data: src });
    _pdf = await loadingTask.promise;
    _page = 1;
    $total.textContent = `/ ${_pdf.numPages}`;
    $pageIn.max = _pdf.numPages;
    $prevBtn.disabled = false;
    $nextBtn.disabled = false;
    $dlBtn.disabled = (typeof src !== 'string');
    $dropZone.style.display = 'none';
    clearMain();
    await renderAllPages();
    await renderThumbnails();
    scrollToPage(1);
  } catch(e) {
    alert('PDF 로드 실패: ' + e.message);
  } finally {
    $loading.classList.remove('show');
  }
}

function clearMain() {
  Array.from($main.children).forEach(c => {
    if (c.id !== 'drop-zone') c.remove();
  });
}

// ── Render all pages ──
async function renderAllPages() {
  for (let p = 1; p <= _pdf.numPages; p++) {
    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    wrap.id = `page-wrap-${p}`;
    const canvas = document.createElement('canvas');
    const badge = document.createElement('div');
    badge.className = 'pg-badge';
    badge.textContent = `${p} / ${_pdf.numPages}`;
    wrap.appendChild(canvas);
    wrap.appendChild(badge);
    $main.appendChild(wrap);
    await renderPage(p, canvas);
  }
}

async function renderPage(pageNum, canvas) {
  const page = await _pdf.getPage(pageNum);
  const s = computeScale(page);
  const viewport = page.getViewport({ scale: s });
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
}

function computeScale(page) {
  if (_scaleMode === 'fit-width') {
    const vw = $main.clientWidth - 60;
    return vw / page.getViewport({ scale: 1 }).width;
  } else if (_scaleMode === 'fit-page') {
    const vw = $main.clientWidth - 60;
    const vh = $main.clientHeight - 60;
    const vp = page.getViewport({ scale: 1 });
    return Math.min(vw / vp.width, vh / vp.height);
  }
  return _scale;
}

// ── Thumbnails ──
async function renderThumbnails() {
  $sidebar.innerHTML = '';
  for (let p = 1; p <= _pdf.numPages; p++) {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (p === 1 ? ' active' : '');
    item.id = `thumb-${p}`;
    item.onclick = () => goPage(p);
    const canvas = document.createElement('canvas');
    const badge = document.createElement('div');
    badge.className = 'thumb-pg';
    badge.textContent = p;
    item.appendChild(canvas);
    item.appendChild(badge);
    $sidebar.appendChild(item);

    const page = await _pdf.getPage(p);
    const vp = page.getViewport({ scale: 1 });
    const s  = 148 / vp.width;
    const tvp = page.getViewport({ scale: s });
    canvas.width  = tvp.width;
    canvas.height = tvp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: tvp }).promise;
  }
  _thumbRendered = true;
}

// ── Navigation ──
function scrollToPage(p) {
  const el = document.getElementById(`page-wrap-${p}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  updateNav(p);
}

function goPage(p) {
  if (!_pdf) return;
  p = Math.max(1, Math.min(p, _pdf.numPages));
  _page = p;
  scrollToPage(p);
}

function changePage(delta) { goPage(_page + delta); }

function updateNav(p) {
  _page = p;
  $pageIn.value = p;
  $prevBtn.disabled = p <= 1;
  $nextBtn.disabled = p >= (_pdf?.numPages || 1);
  // 썸네일 활성화
  document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
  const tEl = document.getElementById(`thumb-${p}`);
  if (tEl) {
    tEl.classList.add('active');
    tEl.scrollIntoView({ block: 'nearest' });
  }
}

// IntersectionObserver로 현재 페이지 감지
const _observer = new IntersectionObserver(entries => {
  let maxRatio = 0, visP = _page;
  entries.forEach(e => {
    if (e.intersectionRatio > maxRatio) {
      maxRatio = e.intersectionRatio;
      const m = e.target.id.match(/page-wrap-(\d+)/);
      if (m) visP = parseInt(m[1]);
    }
  });
  if (maxRatio > 0) updateNav(visP);
}, { root: $main, threshold: Array.from({length:11}, (_,i) => i/10) });

function observePages() {
  document.querySelectorAll('.page-wrap').forEach(el => _observer.observe(el));
}

// ── Zoom ──
function zoom(delta) {
  _scaleMode = 'custom';
  _scale = Math.max(0.25, Math.min(5, _scale + delta));
  $zoomVal.value = Math.round(_scale * 100) + '%';
  reRenderAll();
}

function setScale(mode) {
  _scaleMode = mode;
  $zoomVal.value = mode === 'fit-width' ? '폭 맞춤' : '전체 맞춤';
  reRenderAll();
}

async function reRenderAll() {
  if (!_pdf) return;
  $loading.classList.add('show');
  const wraps = document.querySelectorAll('.page-wrap');
  for (const wrap of wraps) {
    const m = wrap.id.match(/page-wrap-(\d+)/);
    if (!m) continue;
    const p = parseInt(m[1]);
    const canvas = wrap.querySelector('canvas');
    if (canvas) await renderPage(p, canvas);
  }
  $loading.classList.remove('show');
  if (_scaleMode === 'custom') $zoomVal.value = Math.round(_scale * 100) + '%';
  // 재관찰
  observePages();
}

// ── Sidebar ──
function toggleSidebar() {
  _sidebarOpen = !_sidebarOpen;
  $sidebar.classList.toggle('hidden', !_sidebarOpen);
  document.getElementById('thumb-btn').classList.toggle('active', _sidebarOpen);
}

// ── Fullscreen ──
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// ── Download ──
function downloadPDF() {
  if (!_pdfUrl) return;
  const a = document.createElement('a');
  a.href = _pdfUrl;
  a.download = _pdfUrl.split('/').pop() || 'document.pdf';
  a.click();
}

// ── File Input ──
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  _pdfUrl = null;
  $dlBtn.disabled = true;
  const reader = new FileReader();
  reader.onload = ev => loadPDF(new Uint8Array(ev.target.result));
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

// ── URL Input ──
document.getElementById('url-in').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  let url = e.target.value.trim();
  if (!url) return;
  if (!url.startsWith('http') && !url.startsWith('/')) url = '/' + url;
  _pdfUrl = url;
  loadPDF(url);
});

// ── Page Input ──
$pageIn.addEventListener('change', () => goPage(parseInt($pageIn.value) || 1));
$pageIn.addEventListener('keydown', e => { if (e.key === 'Enter') goPage(parseInt($pageIn.value) || 1); });

// ── Drag & Drop ──
function onDragOver(e) { e.preventDefault(); $dropZone.classList.add('over'); }
function onDragLeave(e) { $dropZone.classList.remove('over'); }
function onDrop(e) {
  e.preventDefault();
  $dropZone.classList.remove('over');
  const file = e.dataTransfer?.files[0];
  if (!file || file.type !== 'application/pdf') { alert('PDF 파일만 지원합니다'); return; }
  _pdfUrl = null;
  const reader = new FileReader();
  reader.onload = ev => loadPDF(new Uint8Array(ev.target.result));
  reader.readAsArrayBuffer(file);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
  else if (e.key === '+' || e.key === '=') zoom(0.25);
  else if (e.key === '-') zoom(-0.25);
  else if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  else if (e.key === 't' || e.key === 'T') toggleSidebar();
});

// ── Scroll observer init ──
const _mainObserver = new MutationObserver(() => observePages());
_mainObserver.observe($main, { childList: true });

// ── Resize → re-render fit modes ──
window.addEventListener('resize', () => {
  if (_scaleMode !== 'custom') reRenderAll();
});

// URL param auto-load
const urlParam = new URLSearchParams(location.search).get('url');
if (urlParam) {
  _pdfUrl = urlParam;
  document.getElementById('url-in').value = urlParam;
  loadPDF(urlParam);
}
</script>
</body>
</html>
