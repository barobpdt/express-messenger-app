<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>테이블 주문시스템</title>

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
		rel="stylesheet">

	<!-- Styles -->
	<link rel="stylesheet" href="./css/table-order.css">
	<script src="./js/common.js"></script>
	<link rel="stylesheet" href="/css/pretendard.css">
</head>

<body>
	<div class="table-order-container page" style="width:100%; height:100vh;">
		<!-- Header -->
		<header class="header">
			<div class="header-content">
				<div class="logo">
					<span class="logo-icon">🍽️</span>
					<div class="logo-text">
						<h1>Premium Dining</h1>
						<p>Table Ordering System</p>
					</div>
				</div>
				<div style="flex:1;margin-left:16px;">
					<div class="btn-top" style="width:85px;" onclick="togglePage('chat')">
						채봇
					</div>
				</div>
				<div class="cart-preview" onclick="viewCart()">
					<div class="cart-icon">
						🛒
						<span class="cart-count" id="cartCount">0</span>
					</div>
					<div class="cart-info">
						<h3>장바구니</h3>
						<p id="cartTotal">₩0</p>
					</div>
				</div>
			</div>
		</header>

		<!-- Main Container -->
		<div class="container">
			<!-- Category Section -->
			<section class="category-section">
				<h2 class="section-title">카테고리를 선택하세요</h2>
				<div class="category-grid">
					<div class="category-card active" data-category="drinks" onclick="selectCategory('drinks')">
						<span class="category-icon">🥤</span>
						<h3>음료</h3>
						<p>Drinks & Beverages</p>
					</div>
					<div class="category-card" data-category="alcohol" onclick="selectCategory('alcohol')">
						<span class="category-icon">🍺</span>
						<h3>주류</h3>
						<p>Alcoholic Beverages</p>
					</div>
					<div class="category-card" data-category="appetizers" onclick="selectCategory('appetizers')">
						<span class="category-icon">🍗</span>
						<h3>안주</h3>
						<p>Appetizers & Snacks</p>
					</div>
				</div>
			</section>

			<!-- Menu Section -->
			<section class="menu-section">
				<div class="menu-header">
					<h2 class="menu-title" id="menuTitle">음료 메뉴</h2>
					<span class="menu-count" id="menuCount">4개 메뉴</span>
				</div>
				<div class="menu-grid" id="menuGrid">
					<!-- Menu items will be dynamically inserted here -->
				</div>
			</section>
		</div>

		<!-- Modal for Item Details -->
		<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
			<div class="modal" onclick="event.stopPropagation()">
				<button class="modal-close" onclick="closeModal()">✕</button>
				<img class="modal-image" id="modalImage" src="" alt="">
				<div class="modal-content">
					<div class="modal-header">
						<div class="modal-category" id="modalCategory"></div>
						<h2 class="modal-title" id="modalTitle"></h2>
					</div>
					<p class="modal-description" id="modalDescription"></p>
					<div class="modal-price" id="modalPrice"></div>
					<div class="modal-actions">
						<div class="quantity-control">
							<button class="quantity-btn" onclick="decreaseQuantity()">−</button>
							<span class="quantity-value" id="quantity">1</span>
							<button class="quantity-btn" onclick="increaseQuantity()">+</button>
						</div>
						<button class="modal-add-btn" onclick="addToCart()">
							장바구니에 담기
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Cart Modal -->
		<div class="modal-overlay" id="cartModalOverlay" onclick="closeCartModal(event)">
			<div class="cart-modal" onclick="event.stopPropagation()">
				<button class="modal-close" onclick="closeCartModal()">✕</button>
				<div class="cart-modal-header">
					<h2 class="cart-modal-title">🛒 장바구니</h2>
					<p class="cart-modal-subtitle">주문하실 메뉴를 확인해주세요</p>
				</div>
				<div class="cart-modal-content" id="cartModalContent">
					<!-- Cart items will be dynamically inserted here -->
				</div>
				<div class="cart-modal-footer">
					<div class="cart-total">
						<span class="cart-total-label">총 금액</span>
						<span class="cart-total-price" id="cartModalTotal">₩0</span>
					</div>
					<div class="cart-actions">
						<button class="cart-clear-btn" onclick="clearCart()">
							전체 삭제
						</button>
						<button class="cart-order-btn" onclick="placeOrder()">
							주문하기
						</button>
					</div>
				</div>
			</div>
		</div>

		<script src="./js/table-order.js"></script>
	</div>
	<script>
		renderMenuItems(currentCategory);
		updateCartDisplay();
	</script>
</body>

</html>
