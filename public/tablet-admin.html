<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태블릿 원격 모니터링</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --card: #1a1a28;
            --border: rgba(255,255,255,0.07);
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.25);
            --danger: #ef4444;
            --warn: #f59e0b;
            --ok: #22c55e;
            --text: #f1f5f9;
            --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── 헤더 ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        header h1 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); animation: pulse 2s infinite; }
        .status-dot.connected { background: var(--ok); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .header-right { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--muted); }

        /* ── 레이아웃 ── */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr 300px;
            flex: 1;
            overflow: hidden;
        }

        /* ── 사이드바: 태블릿 목록 ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-title {
            padding: 16px 18px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        .tablet-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tablet-item {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        .tablet-item:hover { background: rgba(255,255,255,0.04); }
        .tablet-item.selected { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); }
        .tablet-item .ti-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .tablet-item .ti-time { font-size: 0.75rem; color: var(--muted); }
        .tablet-item .ti-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); margin-right: 6px; }

        /* ── 메인: 오류 피드 ── */
        main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .feed-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .feed-header h2 { font-size: 0.95rem; font-weight: 600; }
        .btn-clear {
            background: none; border: 1px solid var(--border);
            color: var(--muted); padding: 5px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

        .error-feed { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--muted); gap: 12px;
        }
        .empty-state span { font-size: 3rem; }
        .empty-state p { font-size: 0.9rem; }

        /* ── 오류/스크린샷 카드 ── */
        .error-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .error-card.type-js { border-left: 3px solid var(--danger); }
        .error-card.type-promise { border-left: 3px solid var(--warn); }
        .error-card.type-fetch { border-left: 3px solid #a78bfa; }
        .error-card.type-screenshot { border-left: 3px solid var(--accent); }
        .error-card.type-connected { border-left: 3px solid var(--ok); }

        .ec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .ec-badge {
            font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
            border-radius: 999px; text-transform: uppercase;
        }
        .badge-js { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-promise { background: rgba(245,158,11,0.15); color: var(--warn); }
        .badge-fetch { background: rgba(167,139,250,0.15); color: #a78bfa; }
        .badge-screenshot { background: rgba(99,102,241,0.15); color: var(--accent); }
        .badge-connected { background: rgba(34,197,94,0.15); color: var(--ok); }

        .ec-meta { font-size: 0.72rem; color: var(--muted); }
        .ec-msg { font-size: 0.88rem; margin-bottom: 8px; word-break: break-all; line-height: 1.5; }
        .ec-detail { font-size: 0.75rem; color: var(--muted); font-family: monospace; }

        .ec-screenshot {
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: zoom-in;
        }
        .ec-screenshot img { width: 100%; display: block; }

        /* ── 이미지 라이트박스 ── */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .lightbox.show { opacity: 1; pointer-events: auto; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }

        /* ── 우측: 제어 패널 ── */
        .control-panel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cp-title {
            padding: 16px 18px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        .cp-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }

        .target-row {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .target-row label { font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
        .target-row select {
            flex: 1; background: transparent; border: none;
            color: var(--text); font-size: 0.85rem; outline: none; cursor: pointer;
        }
        .target-row select option { background: var(--card); }

        .cp-section-title { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .cmd-btn {
            width: 100%; padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            display: flex; align-items: center; gap: 10px;
            transition: all 0.2s;
        }
        .cmd-btn:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); }
        .cmd-btn:active { transform: scale(0.98); }
        .cmd-btn .icon { font-size: 1.1rem; }

        .eval-area textarea {
            width: 100%; height: 100px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px; color: var(--text);
            font-family: monospace; font-size: 0.8rem; resize: vertical;
            outline: none;
        }
        .eval-area textarea:focus { border-color: var(--accent); }
        .eval-btn {
            margin-top: 6px; width: 100%; padding: 9px;
            background: var(--accent); border: none; border-radius: 8px;
            color: white; font-weight: 700; cursor: pointer; font-size: 0.85rem;
            transition: opacity 0.2s;
        }
        .eval-btn:hover { opacity: 0.85; }

        .alert-row { display: flex; gap: 6px; }
        .alert-input {
            flex: 1; padding: 9px 12px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.85rem; outline: none;
        }
        .alert-input:focus { border-color: var(--accent); }
        .alert-send {
            padding: 9px 14px;
            background: var(--accent); border: none; border-radius: 8px;
            color: white; font-weight: 700; cursor: pointer; font-size: 0.85rem;
        }

        .ack-log {
            flex: 1; overflow-y: auto;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 6px;
            min-height: 80px; max-height: 140px;
        }
        .ack-item { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
        .ack-item.ok { color: var(--ok); }
        .ack-item.fail { color: var(--danger); }
    </style>
</head>
<body>
<header>
    <h1>
        <div class="status-dot" id="statusDot"></div>
        📡 태블릿 원격 모니터링
    </h1>
    <div class="header-right">
        <span id="statusText">연결 중...</span>
        <span id="errorCount" style="color: var(--danger); font-weight: 700;"></span>
    </div>
</header>

<div class="layout">
    <!-- 태블릿 목록 -->
    <aside class="sidebar">
        <div class="sidebar-title">접속 중인 태블릿</div>
        <div class="tablet-list" id="tabletList">
            <div style="padding: 20px; text-align: center; color: var(--muted); font-size: 0.85rem;">
                태블릿 접속 대기 중...
            </div>
        </div>
    </aside>

    <!-- 오류 피드 -->
    <main>
        <div class="feed-header">
            <h2>실시간 오류 피드</h2>
            <button class="btn-clear" onclick="clearFeed()">🗑 전체 지우기</button>
        </div>
        <div class="error-feed" id="errorFeed">
            <div class="empty-state" id="emptyState">
                <span>🛡️</span>
                <p>오류가 없습니다. 태블릿을 모니터링 중입니다.</p>
            </div>
        </div>
    </main>

    <!-- 제어 패널 -->
    <aside class="control-panel">
        <div class="cp-title">원격 제어 패널</div>
        <div class="cp-body">
            <div class="target-row">
                <label>대상</label>
                <select id="targetSelect">
                    <option value="all">📡 전체 태블릿</option>
                </select>
            </div>

            <div class="cp-section-title">빠른 명령</div>
            <button class="cmd-btn" onclick="sendCmd('reload')">
                <span class="icon">🔄</span> 페이지 새로고침
            </button>
            <button class="cmd-btn" onclick="sendCmd('screenshot')">
                <span class="icon">📸</span> 화면 캡처 요청
            </button>

            <div class="cp-section-title">알림 팝업 전송</div>
            <div class="alert-row">
                <input class="alert-input" id="alertMsg" placeholder="팝업 메시지 입력..." />
                <button class="alert-send" onclick="sendAlert()">전송</button>
            </div>

            <div class="cp-section-title">JS 코드 실행</div>
            <div class="eval-area">
                <textarea id="evalCode" placeholder="// 실행할 JavaScript 입력
// 예: document.title = '점검중'
// 예: location.reload()"></textarea>
                <button class="eval-btn" onclick="sendEval()">▶ 실행</button>
            </div>
        </div>

        <div class="cp-title" style="border-top: 1px solid var(--border);">명령 로그</div>
        <div class="ack-log" id="ackLog"></div>
    </aside>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="스크린샷">
</div>

<script>
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let ws = null;
    let errorCount = 0;
    let tablets = {};       // { tableId: { lastSeen, ... } }
    let selectedTableId = 'all';

    // ── WebSocket 연결 ─────────────────────────────────────────────────────────
    function connect() {
        ws = new WebSocket(`${protocol}//${location.host}`);

        ws.onopen = () => {
            setStatus(true);
            ws.send(JSON.stringify({ type: 'tablet-admin-init' }));
        };

        ws.onclose = () => {
            setStatus(false);
            setTimeout(connect, 3000); // 자동 재연결
        };

        ws.onmessage = (e) => {
            try { handleMessage(JSON.parse(e.data)); } catch { }
        };
    }

    function setStatus(ok) {
        document.getElementById('statusDot').className = 'status-dot' + (ok ? ' connected' : '');
        document.getElementById('statusText').textContent = ok ? '연결됨' : '연결 끊김 (재연결 중...)';
    }

    // ── 메시지 처리 ────────────────────────────────────────────────────────────
    function handleMessage(data) {
        switch (data.type) {
            case 'tablet-list':
                data.tablets.forEach(t => addTablet(t.tableId, t.lastSeen));
                break;
            case 'tablet-connected':
                addTablet(data.tableId, data.timestamp);
                appendCard({ type: 'connected', tableId: data.tableId, timestamp: data.timestamp, message: `테이블 ${data.tableId} 태블릿 접속` });
                break;
            case 'tablet-error':
                appendErrorCard(data);
                break;
            case 'tablet-screenshot':
                appendScreenshotCard(data);
                break;
            case 'tablet-cmd-ack':
                appendAck(data);
                break;
            case 'tablet-cmd-result':
                appendAck({ ...data, result: data.result });
                break;
        }
    }

    // ── 태블릿 목록 ────────────────────────────────────────────────────────────
    function addTablet(tableId, lastSeen) {
        tablets[tableId] = { lastSeen };
        renderTabletList();
        updateTargetSelect();
    }

    function renderTabletList() {
        const el = document.getElementById('tabletList');
        const entries = Object.entries(tablets);
        if (entries.length === 0) return;

        el.innerHTML = entries.map(([tid, info]) => {
            const time = info.lastSeen ? new Date(info.lastSeen).toLocaleTimeString() : '-';
            return `<div class="tablet-item ${selectedTableId == tid ? 'selected' : ''}" onclick="selectTablet('${tid}')">
                <div class="ti-name"><span class="ti-dot"></span>테이블 ${tid}</div>
                <div class="ti-time">마지막 활동: ${time}</div>
            </div>`;
        }).join('');
    }

    function selectTablet(id) {
        selectedTableId = id;
        document.getElementById('targetSelect').value = id;
        renderTabletList();
    }

    function updateTargetSelect() {
        const sel = document.getElementById('targetSelect');
        const existing = new Set(Array.from(sel.options).map(o => o.value));
        Object.keys(tablets).forEach(tid => {
            if (!existing.has(tid)) {
                const opt = document.createElement('option');
                opt.value = tid;
                opt.textContent = `테이블 ${tid}`;
                sel.appendChild(opt);
            }
        });
    }

    // ── 오류 카드 렌더링 ───────────────────────────────────────────────────────
    function appendErrorCard(data) {
        document.getElementById('emptyState')?.remove();
        errorCount++;
        document.getElementById('errorCount').textContent = `⚠ ${errorCount}개 오류`;

        const card = document.createElement('div');
        const errType = data.error?.type || 'js';
        card.className = `error-card type-${errType}`;

        const time = new Date(data.timestamp).toLocaleTimeString();
        const badgeClass = `badge-${errType}`;
        const badgeLabel = { js: 'JS 오류', promise: 'Promise', fetch: 'Network', screenshot: '스크린샷', connected: '접속' }[errType] || errType;

        let detail = '';
        if (data.error?.source) detail += `📄 ${data.error.source}`;
        if (data.error?.line) detail += ` :${data.error.line}`;
        if (data.error?.url) detail += ` → ${data.error.url}`;

        card.innerHTML = `
            <div class="ec-header">
                <span class="ec-badge ${badgeClass}">${badgeLabel}</span>
                <span class="ec-meta">테이블 ${data.tableId} · ${time}</span>
            </div>
            <div class="ec-msg">${escHtml(data.error?.message || '')}</div>
            ${detail ? `<div class="ec-detail">${escHtml(detail)}</div>` : ''}
            ${data.screenshot ? `<div class="ec-screenshot" onclick="openLightbox('${data.screenshot}')"><img src="${data.screenshot}" alt="스크린샷"></div>` : ''}
        `;

        prependFeed(card);
    }

    function appendScreenshotCard(data) {
        document.getElementById('emptyState')?.remove();
        const card = document.createElement('div');
        card.className = 'error-card type-screenshot';
        const time = new Date(data.timestamp).toLocaleTimeString();
        card.innerHTML = `
            <div class="ec-header">
                <span class="ec-badge badge-screenshot">📸 스크린샷</span>
                <span class="ec-meta">테이블 ${data.tableId} · ${time}</span>
            </div>
            ${data.screenshot ? `<div class="ec-screenshot" onclick="openLightbox('${data.screenshot}')"><img src="${data.screenshot}" alt="스크린샷"></div>` : '<div class="ec-msg" style="color:var(--muted)">캡처 실패</div>'}
        `;
        prependFeed(card);
    }

    function appendCard({ type, tableId, timestamp, message }) {
        document.getElementById('emptyState')?.remove();
        const card = document.createElement('div');
        card.className = `error-card type-${type}`;
        const time = new Date(timestamp).toLocaleTimeString();
        const badgeClass = `badge-${type}`;
        card.innerHTML = `
            <div class="ec-header">
                <span class="ec-badge ${badgeClass}">${type === 'connected' ? '접속' : type}</span>
                <span class="ec-meta">테이블 ${tableId} · ${time}</span>
            </div>
            <div class="ec-msg">${escHtml(message)}</div>
        `;
        prependFeed(card);
    }

    function prependFeed(card) {
        const feed = document.getElementById('errorFeed');
        feed.insertBefore(card, feed.firstChild);
    }

    function clearFeed() {
        document.getElementById('errorFeed').innerHTML = `
            <div class="empty-state" id="emptyState">
                <span>🛡️</span>
                <p>오류가 없습니다. 태블릿을 모니터링 중입니다.</p>
            </div>`;
        errorCount = 0;
        document.getElementById('errorCount').textContent = '';
    }

    // ── 원격 명령 ──────────────────────────────────────────────────────────────
    function getTargetId() {
        return document.getElementById('targetSelect').value;
    }

    function sendCmd(cmd, extra = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'tablet-cmd', tableId: getTargetId(), cmd, ...extra }));
    }

    function sendAlert() {
        const msg = document.getElementById('alertMsg').value.trim();
        if (!msg) return;
        sendCmd('alert', { message: msg });
        document.getElementById('alertMsg').value = '';
    }

    function sendEval() {
        const code = document.getElementById('evalCode').value.trim();
        if (!code) return;
        sendCmd('eval', { code });
    }

    function appendAck(data) {
        const log = document.getElementById('ackLog');
        const el = document.createElement('div');
        const ok = data.sent !== false;
        el.className = 'ack-item ' + (ok ? 'ok' : 'fail');
        const time = new Date(data.timestamp || Date.now()).toLocaleTimeString();
        let text = `[${time}] ${data.cmd} → 테이블 ${data.tableId}`;
        if (data.result !== undefined) text += ` = ${data.result}`;
        el.textContent = text;
        log.insertBefore(el, log.firstChild);
    }

    // ── 라이트박스 ─────────────────────────────────────────────────────────────
    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('show');
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('show');
    }

    // ── 유틸 ───────────────────────────────────────────────────────────────────
    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // target select 변경 → selectedTableId 동기화
    document.getElementById('targetSelect').addEventListener('change', (e) => {
        selectedTableId = e.target.value;
        renderTabletList();
    });

    // 시작
    connect();
</script>
</body>
</html>
