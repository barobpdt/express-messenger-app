<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #e5e7eb;
        }
        .calendar-cell {
            background-color: white;
            min-height: 120px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col transition-all duration-300">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold tracking-wider"><i class="fa-solid fa-rocket mr-2 text-indigo-400"></i>TaskTrack</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><a href="dashboard.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li><a href="step.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"><i class="fa-solid fa-columns w-6"></i> Task Board</a></li>
                <li><a href="calendar.html" class="flex items-center px-6 py-3 bg-gray-800 border-l-4 border-indigo-500 text-white"><i class="fa-solid fa-calendar-alt w-6"></i> Calendar</a></li>
                <li><a href="artifacts.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"><i class="fa-solid fa-folder-tree w-6"></i> 산출물 관리</a></li>
                <li><a href="team.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors mt-8"><i class="fa-solid fa-users w-6"></i> 팀 설정</a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-sm font-bold">U</div>
                <div><p class="text-sm font-medium">User Name</p><p class="text-xs text-gray-400">Team: Dev Team</p></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-10 glass-panel">
            <div class="flex items-center bg-gray-100 rounded-lg px-3 py-1.5 w-96">
                <i class="fa-solid fa-search text-gray-400"></i><input type="text" placeholder="Search tasks, artifacts..." class="bg-transparent border-none outline-none ml-2 w-full text-sm">
            </div>
        </header>

        <!-- Calendar View Container -->
        <div class="flex-1 p-6 flex flex-col h-full bg-white space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <button class="p-2 border border-gray-300 rounded hover:bg-gray-50"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2 class="text-2xl font-bold text-gray-800">November 2026</h2>
                    <button class="p-2 border border-gray-300 rounded hover:bg-gray-50"><i class="fa-solid fa-chevron-right"></i></button>
                    <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 font-medium ml-4">Today</button>
                </div>
                <div class="flex space-x-2">
                    <button class="px-4 py-2 bg-indigo-50 text-indigo-700 font-medium rounded">Month</button>
                    <button class="px-4 py-2 bg-white text-gray-500 border border-gray-200 font-medium rounded hover:bg-gray-50">Week</button>
                </div>
            </div>

            <div class="flex-1 border border-gray-200 rounded-lg overflow-hidden flex flex-col mt-4">
                <!-- Day letters -->
                <div class="grid grid-cols-7 bg-gray-50 text-center py-3 border-b border-gray-200 text-sm font-semibold text-gray-600">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <!-- Grid Cells Skeleton -->
                <div class="calendar-grid flex-1">
                    <!-- Example Week 1 Row -->
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">25</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">26</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">27</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">28</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">29</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-400">
                        <span class="block mb-2 text-right">30</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">1</span>
                    </div>

                    <!-- Example Week 2 Row -->
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">2</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800 relative">
                        <span class="block text-right mb-1">3</span>
                        <!-- Task bar -->
                        <div class="bg-indigo-100 text-indigo-700 border border-indigo-200 text-xs px-2 py-1 mb-1 rounded cursor-pointer truncate">
                            Database Design Review
                        </div>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">4</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800 bg-indigo-50 font-bold">
                        <span class="block mb-2 text-right rounded-full bg-indigo-600 text-white w-6 h-6 flex items-center justify-center float-right text-xs">5</span>
                        <div class="clear-both"></div>
                        <!-- Task bar spanning logic (simplified for skeleton) -->
                        <div class="bg-purple-100 text-purple-700 border border-purple-200 text-xs px-2 py-1 mb-1 rounded cursor-pointer truncate">
                            API Implementation Start
                        </div>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">6</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">7</span>
                    </div>
                    <div class="calendar-cell p-2 text-gray-800">
                        <span class="block mb-2 text-right">8</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
